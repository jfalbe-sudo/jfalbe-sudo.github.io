<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040F1A">
<title>Timer · JIF</title>
<style>
:root {
  --ink:#040F1A;--ink2:#081828;--ink3:#0d2236;--ink4:#122d47;--ink5:#1a3d5c;
  --gold:#F5AC00;--green:#3DDC97;--red:#FF5C5C;--amber:#FF9F43;--blue:#4DA6FF;--purple:#B06EFF;
  --slate:#6B8FA8;--mist:#A8C4D8;--snow:#EEF4F8;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono','Consolas',monospace;--r:16px;--r2:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--ink);color:var(--snow);min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.app-header{padding:14px 18px 10px;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50;background:var(--ink);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.date-line{font-size:13px;color:var(--mist);margin-top:2px;font-weight:500}
.week-chip{background:var(--ink4);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gold)}
.sync-indicator{width:8px;height:8px;border-radius:50%;background:var(--slate);flex-shrink:0;transition:background .3s}
.sync-indicator.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
.sync-indicator.ok{background:var(--green)}
.sync-indicator.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
nav{display:flex;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:53px;z-index:49}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--slate);font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;transition:color .15s,border-color .15s}
.nav-btn svg{width:17px;height:17px}
.nav-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
main{flex:1;overflow-y:auto;padding:12px 12px 40px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--ink2);border-radius:var(--r);padding:14px}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.stat-box{background:var(--ink3);border-radius:var(--r2);padding:11px 8px;text-align:center}
.stat-num{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.stat-lbl{font-size:9px;color:var(--slate);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.good{color:var(--green)}.bad{color:var(--red)}.amber{color:var(--amber)}.white{color:var(--snow)}.blue{color:var(--blue)}
.prog-wrap{margin-top:11px}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--slate);margin-bottom:4px}
.prog-bg{background:rgba(255,255,255,.06);border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.live-card{background:linear-gradient(140deg,var(--ink3),var(--ink4));border:1.5px solid rgba(245,172,0,.35);border-radius:var(--r);padding:14px}
.live-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.4s ease-in-out infinite}
.live-project{font-size:16px;font-weight:700;margin-top:5px}
.live-sub{font-size:11px;color:var(--slate);margin-top:1px}
.live-time{font-size:40px;font-weight:900;font-family:var(--mono);color:var(--gold);text-align:center;margin:10px 0;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.entry{background:var(--ink3);border-radius:var(--r2);margin-bottom:5px;overflow:hidden}
.entry-main-row{display:flex;align-items:center;gap:10px;padding:10px 12px}
.entry-time-col{text-align:right;flex-shrink:0;min-width:34px}
.entry-time{font-size:11px;color:var(--slate);font-family:var(--mono);line-height:1.7}
.entry-divider{width:1px;height:26px;background:rgba(255,255,255,.08);flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-on{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-cat{font-size:11px;color:var(--slate);margin-top:1px}
.entry-dur{font-size:13px;font-weight:800;color:var(--gold);font-family:var(--mono);flex-shrink:0}
.entry-actions{display:flex;border-top:1px solid rgba(255,255,255,.05)}
.entry-btn{flex:1;background:none;border:none;color:var(--slate);font-size:11px;font-weight:700;padding:8px;cursor:pointer;font-family:var(--font)}
.entry-btn.edit{color:var(--gold)}.entry-btn.del{color:var(--red)}
.entry-btn-sep{width:1px;background:rgba(255,255,255,.05)}
.edit-panel{background:var(--ink4);padding:11px 12px;border-top:1px solid rgba(245,172,0,.2)}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.edit-input{width:100%;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:var(--snow);padding:10px 11px;font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none}
.edit-input:focus{border-color:var(--gold)}
.edit-btns{display:flex;gap:7px}
.btn-save-edit{flex:1;background:var(--gold);color:var(--ink);border:none;border-radius:50px;padding:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font)}
.btn-cancel-edit{flex:1;background:var(--ink3);color:var(--slate);border:none;border-radius:50px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)}
.special-day{border-radius:var(--r2);padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:5px}
.special-syg{background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.3)}
.special-barnsyg{background:rgba(77,166,255,.12);border:1px solid rgba(77,166,255,.3)}
.special-p56{background:rgba(176,110,255,.12);border:1px solid rgba(176,110,255,.3)}
.empty{text-align:center;color:var(--slate);padding:24px 16px;font-size:14px;line-height:1.7}
.btn{display:block;width:100%;border:none;border-radius:50px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-green{background:var(--green);color:var(--ink)}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--ink4);color:var(--snow)}
.btn-sm{padding:8px 14px;font-size:12px;font-weight:700;border-radius:50px;border:none;cursor:pointer;font-family:var(--font)}
.btn-now{background:rgba(245,172,0,.12);color:var(--gold);border:1px solid rgba(245,172,0,.25);margin-top:5px;width:100%}
.form-col{display:flex;flex-direction:column;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.field-label{font-size:10px;color:var(--slate);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px}
select,input[type=time],input[type=text]{width:100%;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r2);color:var(--snow);padding:11px 13px;font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none;transition:border-color .15s}
select:focus,input:focus{border-color:var(--gold)}
select option{background:#081828}
.on-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.on-chip{background:var(--ink4);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--snow)}
.on-chip.sel{background:rgba(245,172,0,.2);border-color:var(--gold);color:var(--gold)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.cat-btn{background:var(--ink4);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--r2);padding:10px 8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;color:var(--snow)}
.cat-btn.sel{background:rgba(245,172,0,.15);border-color:var(--gold);color:var(--gold)}
.special-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.special-btn{border:1.5px solid;border-radius:var(--r2);padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;background:transparent;font-family:var(--font)}
.special-btn.syg{border-color:rgba(255,92,92,.4);color:var(--red)}
.special-btn.barnsyg{border-color:rgba(77,166,255,.4);color:var(--blue)}
.special-btn.syg.sel{background:rgba(255,92,92,.15)}
.special-btn.barnsyg.sel{background:rgba(77,166,255,.15)}
.week-row{background:var(--ink3);border-radius:var(--r2);margin-bottom:5px;border:1.5px solid transparent;overflow:hidden}
.week-row.today{border-color:rgba(245,172,0,.3)}
.week-row.syg-day{border-color:rgba(255,92,92,.3);background:rgba(255,92,92,.05)}
.week-row.barnsyg-day{border-color:rgba(77,166,255,.3);background:rgba(77,166,255,.05)}
.wr-hdr{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.wr-day{width:36px;flex-shrink:0}
.wr-name{font-size:13px;font-weight:700}
.wr-date{font-size:10px;color:var(--slate);margin-top:1px}
.wr-mid{flex:1;min-width:0}
.wr-bar-row{display:flex;justify-content:space-between;font-size:10px;color:var(--slate);margin-bottom:3px}
.wr-bar-bg{background:rgba(255,255,255,.06);border-radius:99px;height:5px;overflow:hidden}
.wr-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.wr-diff{font-size:10px;margin-top:3px;font-weight:700;font-family:var(--mono)}
.wr-right{text-align:right;flex-shrink:0}
.wr-badge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700;background:var(--gold);color:var(--ink);display:inline-block}
.wr-body{display:none;padding:0 12px 10px;border-top:1px solid rgba(255,255,255,.05)}
.wr-body.open{display:block}
.week-summary{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.ws{background:var(--ink3);border-radius:var(--r2);padding:12px}
.ws-val{font-size:20px;font-weight:900;font-family:var(--mono)}
.ws-lbl{font-size:10px;color:var(--slate);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.promak-box{background:var(--ink3);border-radius:var(--r2);padding:11px 13px;border:1px solid rgba(245,172,0,.15)}
.promak-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.promak-row:last-child{border-bottom:none}
.report-week{background:var(--ink3);border-radius:var(--r2);margin-bottom:6px;overflow:hidden}
.report-week-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;cursor:pointer}
.report-week-title{font-size:13px;font-weight:700}
.report-week-meta{font-size:11px;color:var(--slate)}
.report-week-hours{font-size:14px;font-weight:800;color:var(--gold);font-family:var(--mono)}
.report-week-body{display:none;padding:0 13px 11px}
.report-week-body.open{display:block}
.report-entry{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.report-entry:last-child{border-bottom:none}
.report-year-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.rys{background:var(--ink3);border-radius:var(--r2);padding:12px;text-align:center}
.rys-val{font-size:20px;font-weight:900}
.rys-lbl{font-size:9px;color:var(--slate);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.daytype-row{display:flex;gap:6px;flex-wrap:wrap}
.daytype-btn{border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;font-family:var(--font);color:var(--slate)}
.daytype-btn.sel-kontor{background:rgba(61,220,151,.15);border-color:var(--green);color:var(--green)}
.daytype-btn.sel-hjemme{background:rgba(245,172,0,.15);border-color:var(--gold);color:var(--gold)}
.daytype-btn.sel-syg{background:rgba(255,92,92,.15);border-color:var(--red);color:var(--red)}
.daytype-btn.sel-barnsyg{background:rgba(77,166,255,.15);border-color:var(--blue);color:var(--blue)}
.daytype-btn.sel-p56{background:rgba(176,110,255,.15);border-color:var(--purple);color:var(--purple)}
.daytype-btn.sel-ferie{background:rgba(61,220,151,.15);border-color:var(--green);color:var(--green)}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink3);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:11px 20px;font-size:13px;font-weight:600;transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:999;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(61,220,151,.4);color:var(--green)}
.toast.err{border-color:rgba(255,92,92,.4);color:var(--red)}
.save-bar{position:fixed;top:0;left:0;height:2px;width:0;background:var(--gold);z-index:200;transition:width .3s}
/* TIDSLINJE */
.timeline-wrap{position:relative;margin:4px 0;user-select:none}
.timeline-track{position:relative;height:52px;background:var(--ink3);border-radius:10px;overflow:hidden;cursor:crosshair}
.timeline-block{position:absolute;top:4px;bottom:4px;border-radius:6px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:700;overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .15s;pointer-events:none}
.timeline-block.normal{background:rgba(245,172,0,.7);color:var(--ink)}
.timeline-block.syg{background:rgba(255,92,92,.7);color:#fff}
.timeline-block.barnsyg{background:rgba(77,166,255,.7);color:#fff}
.timeline-block.p56{background:rgba(176,110,255,.7);color:#fff}
.timeline-block.ferie{background:rgba(61,220,151,.5);color:var(--ink)}
.timeline-block.overlap{background:rgba(255,50,50,.9);color:#fff;border:2px solid var(--red)}
.timeline-now{position:absolute;top:0;bottom:0;width:2px;background:var(--gold);opacity:.8;pointer-events:none}
.tl-sel{position:absolute;top:0;bottom:0;background:rgba(245,172,0,.18);border:2px solid var(--gold);border-radius:7px;pointer-events:auto;box-sizing:border-box}
.tl-handle{position:absolute;top:0;bottom:0;width:18px;background:var(--gold);opacity:.85;border-radius:5px;cursor:ew-resize;display:flex;align-items:center;justify-content:center}
.tl-handle::after{content:'';display:block;width:2px;height:16px;background:rgba(0,0,0,.35);border-radius:2px;box-shadow:3px 0 0 rgba(0,0,0,.35)}
.tl-handle.left{left:0;border-radius:5px 2px 2px 5px}
.tl-handle.right{right:0;border-radius:2px 5px 5px 2px}
.tl-body{position:absolute;left:18px;right:18px;top:0;bottom:0;cursor:grab;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);overflow:hidden;white-space:nowrap}
.tl-body:active{cursor:grabbing}
/* ── DAG TIDSLINJE — smart kombi ───────────────────── */
.dag-tl-wrap{position:relative;margin:4px 0;user-select:none;touch-action:none}
.dag-tl-track{position:relative;background:var(--ink3);border-radius:10px;overflow:visible}
.dag-tl-row{position:relative;height:48px}
.dag-tl-row+.dag-tl-row{margin-top:3px}
.dag-tl-block{position:absolute;top:4px;bottom:4px;border-radius:7px;display:flex;align-items:stretch;overflow:hidden;cursor:grab;touch-action:none;box-sizing:border-box;transition:filter .1s}
.dag-tl-block:active{cursor:grabbing;filter:brightness(1.15)}
.dtl-lh,.dtl-rh{width:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);cursor:ew-resize}
.dtl-lh{border-radius:7px 0 0 7px}.dtl-rh{border-radius:0 7px 7px 0}
.dtl-lh::after,.dtl-rh::after{content:'';width:2px;height:13px;background:rgba(255,255,255,.4);border-radius:2px}
.dtl-inner{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2px 5px;overflow:hidden;min-width:0;pointer-events:none}
.dtl-name{font-size:10px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.dtl-time{font-size:9px;opacity:.75;white-space:nowrap;line-height:1.2}
.dag-tl-now{position:absolute;top:-3px;width:2.5px;background:var(--gold);opacity:.95;border-radius:2px;pointer-events:none;z-index:5}
.dag-tl-tooltip{position:absolute;background:var(--ink4);border:1px solid rgba(245,172,0,.4);color:var(--snow);font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;white-space:nowrap;pointer-events:none;z-index:20;transform:translateX(-50%);bottom:calc(100% + 8px);transition:opacity .1s;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.dag-tl-hour{position:absolute;font-size:9px;color:var(--slate);transform:translateX(-50%);top:3px}
.dag-tl-hours-row{position:relative;height:18px}
/* ── FROKOST ───────────────────────────────────────── */
.frokost-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 13px;margin-bottom:4px}
.frokost-icon{font-size:20px;flex-shrink:0}
.frokost-info{flex:1;min-width:0}
.frokost-title{font-size:12px;font-weight:700;color:var(--mist)}
.frokost-time{font-size:11px;color:var(--slate)}
.frokost-skip{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--slate);font-size:11px;font-weight:600;padding:6px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.frokost-skip:hover{border-color:var(--red);color:var(--red)}
.frokost-skip.skipped{border-color:rgba(61,220,151,.4);color:var(--green)}
/* Frokost blok på tidslinje */
.dag-tl-frokost{position:absolute;top:2px;bottom:2px;border-radius:5px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.07) 0px,rgba(255,255,255,.07) 4px,transparent 4px,transparent 8px);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.3);font-weight:700;overflow:hidden;pointer-events:none}
/* ── FAB KNAPPER ──────────────────────────────────────── */
.fab-group{position:fixed;bottom:76px;right:14px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.45);transition:transform .12s}
.fab:active{transform:scale(.9)}
.fab-start{background:var(--gold)}
.fab-scan{background:var(--ink4);border:2px solid rgba(245,172,0,.3)}
.fab svg{width:24px;height:24px;stroke-width:2.2;fill:none}
.fab-start svg{stroke:#0d1b2a}
.fab-scan svg{stroke:var(--gold)}
.fab.active-scan{background:var(--red);animation:fabPulse 1.2s infinite}
@keyframes fabPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,92,92,.5)}60%{box-shadow:0 0 0 12px rgba(255,92,92,0)}}
.fab-label{position:absolute;right:62px;background:var(--ink3);color:var(--snow);font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
.fab-wrap{position:relative;display:flex;align-items:center}
.fab-wrap:hover .fab-label{opacity:1}
/* Scan overlay */
.scan-overlay{position:fixed;inset:0;z-index:300;background:#000;display:flex;flex-direction:column}
.scan-overlay.hidden{display:none}
.scan-overlay video{flex:1;width:100%;object-fit:cover}
.scan-viewfinder{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:240px;height:160px;border:2px solid var(--gold);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.scan-line{position:absolute;left:8px;right:8px;top:0;height:2px;background:var(--gold);animation:scanLine 1.8s ease-in-out infinite;opacity:.85}
@keyframes scanLine{0%,100%{top:8px}50%{top:calc(100% - 10px)}}
.scan-toolbar{background:rgba(13,27,42,.95);padding:14px 20px 28px;display:flex;flex-direction:column;gap:10px}
.scan-cancel{background:var(--ink4);border:none;color:var(--slate);padding:11px;border-radius:10px;font-size:14px;cursor:pointer}
.scan-hint{font-size:12px;color:var(--slate);text-align:center}
/* Quick-start + Scan result popup (delt design) */
.scan-popup{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center}
.scan-popup.hidden{display:none}
.scan-popup-inner{background:var(--ink2);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:500px}
.scan-popup-on{font-size:26px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:4px;letter-spacing:1px}
.scan-popup-sub{font-size:12px;color:var(--slate);text-align:center;margin-bottom:14px}
.scan-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.scan-cat-btn{background:var(--ink3);border:1.5px solid var(--ink4);color:var(--snow);padding:12px 10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:background .12s,border-color .12s}
.scan-cat-btn.sel{background:rgba(245,172,0,.18);border-color:var(--gold);color:var(--gold)}
/* ON-chips i popup */
.scan-on-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.scan-on-chip{background:var(--ink3);border:1.5px solid var(--ink4);color:var(--snow);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
.scan-on-chip.sel{background:rgba(245,172,0,.15);border-color:var(--gold);color:var(--gold)}
.scan-on-custom{width:100%;background:var(--ink3);border:1.5px solid var(--ink4);color:var(--snow);padding:9px 12px;border-radius:10px;font-size:13px;margin-bottom:10px;box-sizing:border-box}
.scan-on-custom:focus{outline:none;border-color:var(--gold)}
.scan-confirm{width:100%;padding:14px;background:var(--gold);color:var(--ink);font-size:15px;font-weight:900;border:none;border-radius:12px;cursor:pointer}
.scan-dismiss{width:100%;padding:10px;background:transparent;border:none;color:var(--slate);font-size:13px;cursor:pointer;margin-top:4px}

.kal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kal-title{font-size:16px;font-weight:800}
.kal-nav{background:var(--ink4);border:none;color:var(--gold);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.kal-grid{display:grid;grid-template-columns:24px repeat(7,1fr);gap:3px}
.kal-week-num{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(107,143,168,.5);padding:2px}
.kal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--slate);padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
.kal-cell{border-radius:8px;padding:4px 2px;min-height:42px;position:relative;cursor:pointer;transition:background .15s}
.kal-cell:active{opacity:.7}
.kal-cell.other-month{opacity:.25}
.kal-cell.today{border:1.5px solid var(--gold)}
.kal-date{font-size:12px;font-weight:700;text-align:center;margin-bottom:2px}
.kal-dot{width:5px;height:5px;border-radius:50%;margin:1px auto}
.kal-cell.has-kontor{background:rgba(61,220,151,.08)}
.kal-cell.has-hjemme{background:rgba(245,172,0,.08)}
.kal-cell.has-syg{background:rgba(255,92,92,.15)}
.kal-cell.has-barnsyg{background:rgba(77,166,255,.15)}
.kal-cell.has-ferie{background:rgba(61,220,151,.15)}
.kal-cell.has-fri{background:rgba(176,110,255,.1)}
.kal-cell.weekend{opacity:.4}
.kal-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.kal-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--slate)}
.kal-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
//  GITHUB SYNC CONFIG
// ═══════════════════════════════════════════════════════
const GIST_ID    = 'cdff9229870dc7f4c74b99cf30acedfd';
const GIST_FILE  = 'timer_data.json';
const GIST_API   = `https://api.github.com/gists/${GIST_ID}`;
function getToken(){ return localStorage.getItem('vct_ghtoken')||''; }

// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const DAY_TARGET = [7.5,7.5,7.5,7.5,6.5,0,0];
const DAY_S   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const MONTHS_S= ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
const WDAYS   = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
const QUICK_ON= ['ON','2613','2965','2973','3179','3200','3201'];
const CATS    = [
  {label:'Admin/Møde',icon:'📋'},
  {label:'Undervisning',icon:'🎓'},
  {label:'ON',icon:'🔧'},
  {label:'Service',icon:'⚙️'},
  {label:'Andet',icon:'📌'},
];
const CATS_NO_ON=new Set(['Admin/Møde','Undervisning']);
const DAY_TYPES=[
  {id:'kontor',label:'🏢 Kontor',cls:'sel-kontor'},
  {id:'hjemme',label:'🏠 Hjemme',cls:'sel-hjemme'},
  {id:'syg',label:'🤒 Syg',cls:'sel-syg'},
  {id:'barnsyg',label:'👶 Barn syg',cls:'sel-barnsyg'},
  {id:'p56',label:'§56',cls:'sel-p56'},
  {id:'ferie',label:'🌴 Ferie',cls:'sel-ferie'},
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let db = { version:3, days:{} }; // master database
let activeTimer=null, timerIv=null, currentTab='dag';
let selCat='', selOn='', customOn='', selSpecial='';
let tilfoejStart='', tilfoejStop='';
let editingIdx=-1;
let syncTimer=null, isDirty=false;

// ═══════════════════════════════════════════════════════
//  GITHUB SYNC
// ═══════════════════════════════════════════════════════
function setSyncStatus(s){ // 'syncing' | 'ok' | 'err' | ''
  const d=document.getElementById('syncDot');
  if(d){ d.className='sync-indicator'+(s?' '+s:''); }
}

async function ghLoad(){
  setSyncStatus('syncing');
  try {
    const r=await fetch(GIST_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) throw new Error(r.status);
    const j=await r.json();
    const fileContent=j.files[GIST_FILE]?.content;
    if(!fileContent) throw new Error('Ingen data i Gist');
    const decoded=JSON.parse(fileContent);
    db=decoded;
    localStorage.setItem('vct_db', JSON.stringify(db));
    // Synkroniser activeTimer fra Gist — anden enhed kan have startet den
    if(db.activeTimer){
      const remote=db.activeTimer;
      // Genberegn t0 fra startHM så live-timer er korrekt
      const [sh,sm]=remote.startHM.split(':').map(Number);
      const now=new Date();
      const startMs=new Date(now.getFullYear(),now.getMonth(),now.getDate(),sh,sm,0).getTime();
      remote.t0=startMs;
      activeTimer=remote;
      localStorage.setItem('vct_activeTimer',JSON.stringify(activeTimer));
    } else if(db.hasOwnProperty('activeTimer') && db.activeTimer===null){
      // Anden enhed har stoppet timeren
      activeTimer=null;
      localStorage.removeItem('vct_activeTimer');
    }
    setSyncStatus('ok');
  } catch(e){
    console.error('ghLoad',e);
    setSyncStatus('err');
    const local=localStorage.getItem('vct_db');
    if(local) try{ db=JSON.parse(local); }catch{}
  }
}

async function ghSave(){
  if(!isDirty) return;
  setSyncStatus('syncing');
  try {
    // Inkluder activeTimer i Gist-data så andre enheder ser den
    db.activeTimer = activeTimer ? {
      on: activeTimer.on,
      cat: activeTimer.cat,
      label: activeTimer.label,
      startHM: activeTimer.startHM,
      special: activeTimer.special||null,
    } : null;
    const body={files:{[GIST_FILE]:{content:JSON.stringify(db,null,2)}}};
    const r=await fetch(GIST_API,{
      method:'PATCH',
      headers:{'Authorization':`token ${getToken()}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok){ const t=await r.text(); throw new Error(t); }
    localStorage.setItem('vct_db', JSON.stringify(db));
    isDirty=false;
    setSyncStatus('ok');
  } catch(e){
    console.error('ghSave',e);
    setSyncStatus('err');
    toast('Sync fejl — data gemt lokalt','err');
  }
}

function scheduleSave(){
  isDirty=true;
  localStorage.setItem('vct_db', JSON.stringify(db));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(ghSave, 2000);
}

function checkDailyBackup(){
  const today = dateKey(new Date());
  const lastBackup = localStorage.getItem('vct_last_backup');
  if(lastBackup === today) return; // Allerede taget backup i dag
  // Vent 5 sekunder efter app åbner så data er loadet
  setTimeout(()=>{
    if(Object.keys(db.days).length === 0) return; // Ingen data endnu
    downloadBackup();
    localStorage.setItem('vct_last_backup', today);
  }, 5000);
}

// ═══════════════════════════════════════════════════════
//  DATA ACCESS
// ═══════════════════════════════════════════════════════
function getEntries(dk)     { return (db.days[dk]||{}).entries||[]; }
function getDayType(dk)     { return (db.days[dk]||{}).type||'kontor'; }
function getPartial(dk,t)   { return ((db.days[dk]||{}).partial||{})[t]||''; }

function ensureDay(dk){ if(!db.days[dk]) db.days[dk]={entries:[],type:'kontor',partial:{}}; }

function saveEntries(dk,arr){
  ensureDay(dk); db.days[dk].entries=arr; scheduleSave();
}
function addEntry(dk,e){
  ensureDay(dk); db.days[dk].entries.push(e); scheduleSave();
}
function setDayType(dk,t){
  ensureDay(dk); db.days[dk].type=t; scheduleSave();
}
function savePartialH(dk,t,v){
  ensureDay(dk);
  if(!db.days[dk].partial) db.days[dk].partial={};
  if(v) db.days[dk].partial[t]=v; else delete db.days[dk].partial[t];
  scheduleSave();
}

// ═══════════════════════════════════════════════════════
//  DATE
// ═══════════════════════════════════════════════════════
const fmtH=h=>{if(!h||h<0)h=0;const t=Math.round(h*60);return`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;};
const nowHM=()=>{const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const dateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const weekNum=d=>{const c=new Date(d);c.setHours(0,0,0,0);c.setDate(c.getDate()+4-(c.getDay()||7));return Math.ceil((((c-new Date(c.getFullYear(),0,1))/86400000)+1)/7);};
const monday=d=>{const c=new Date(d);const day=c.getDay()||7;c.setDate(c.getDate()-day+1);c.setHours(0,0,0,0);return c;};
const todayIdx=()=>(new Date().getDay()+6)%7;
const hmToH=hm=>{if(!hm)return 0;const[h,m]=hm.split(':').map(Number);return h+m/60;};

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
async function init(){
  updateHeader();
  // Brug lokalt cache straks mens vi loader fra GitHub
  const local=localStorage.getItem('vct_db');
  if(local) { try{ db=JSON.parse(local); }catch{} }
  // Gist behøver ikke SHA
  const saved=localStorage.getItem('vct_activeTimer');
  if(saved) try{ activeTimer=JSON.parse(saved); }catch{}
  tab('dag');
  // Tjek om token er sat
  if(!getToken()){
    showTokenSetup();
    return;
  }
  // Load fra GitHub i baggrunden
  await ghLoad();
  render(); // Genrender med GitHub data
  checkDailyBackup(); // Auto-backup én gang om dagen
  // Auto-sync hvert 30 sek (henter andres ændringer)
  setInterval(async()=>{ if(!isDirty){ await ghLoad(); render(); }}, 30000);
}

function showTokenSetup(){
  document.getElementById('main').innerHTML=`
  <div class="card" style="margin-top:20px">
    <div class="section-label">Første gangs opsætning</div>
    <div style="font-size:14px;color:var(--mist);margin-bottom:14px;line-height:1.6">
      Indtast dit GitHub token for at aktivere sync mellem PC og telefon.
      Token gemmes kun på denne enhed.
    </div>
    <div>
      <label class="field-label">GitHub Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_..." style="width:100%;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r2);color:var(--snow);padding:12px 14px;font-size:15px;font-family:var(--font);outline:none">
    </div>
    <button class="btn btn-gold" style="margin-top:12px" onclick="saveToken()">Gem token og start →</button>
    <div style="font-size:11px;color:var(--slate);margin-top:10px">
      Token gemmes kun lokalt i browseren — ikke i koden.
    </div>
  </div>`;
}

async function saveToken(){
  const t=document.getElementById('tokenInput').value.trim();
  if(!t||!t.startsWith('ghp_')){toast('Ugyldigt token','err');return;}
  localStorage.setItem('vct_ghtoken',t);
  toast('Token gemt!','ok');
  await ghLoad();
  render();
}

function updateHeader(){
  const d=new Date();
  document.getElementById('hdrDate').textContent=`${WDAYS[d.getDay()]} ${d.getDate()}. ${MONTHS_S[d.getMonth()]}`;
  document.getElementById('hdrWeek').textContent=`Uge ${weekNum(d)}`;
}

// ═══════════════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════════════
function tab(name){
  currentTab=name; editingIdx=-1;
  if(name==='tilfoej'){ selCat=''; selOn=''; customOn=''; selSpecial=''; tilfoejStart=''; tilfoejStop=''; }
  ['dag','tilfoej','uge','rapport','kalender'].forEach(t=>document.getElementById(`tab-${t}`).classList.toggle('on',t===name));
  render();
}
function render(){
  // Gem hvilke panels der er åbne inden re-render
  const openIds=new Set([...document.querySelectorAll('.wr-body.open,.report-week-body.open')].map(el=>el.id));
  const m=document.getElementById('main');
  if(currentTab==='dag')          { m.innerHTML=dagHTML(); setTimeout(bindDagTimelineHandlers,0); }
  else if(currentTab==='tilfoej') { m.innerHTML=tilfoejHTML(); setTimeout(bindSelHandlers,0); }
  else if(currentTab==='uge')     m.innerHTML=ugeHTML();
  else if(currentTab==='rapport')  m.innerHTML=rapportHTML();
  else                            m.innerHTML=kalenderHTML();
  // Gendan åbne panels efter render
  openIds.forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.add('open'); });
  if(currentTab==='dag'&&activeTimer) startDisp();
}

// ═══════════════════════════════════════════════════════
//  DAG
// ═══════════════════════════════════════════════════════
function buildEntryHTML(e,i,dk){
  const isEditing=editingIdx===i;
  const editPanel=isEditing?`
    <div class="edit-panel">
      <div class="field-label" style="margin-bottom:6px">Ret registrering</div>
      <div style="margin-bottom:7px"><label class="field-label">ON / Projekt</label><input type="text" class="edit-input" id="editOn" value="${e.on}"></div>
      <div class="edit-row">
        <div><label class="field-label">Start</label><input type="time" class="edit-input" id="editStart" value="${e.start}"></div>
        <div><label class="field-label">Stop</label><input type="time" class="edit-input" id="editStop" value="${e.stop}"></div>
      </div>
      <div class="edit-btns">
        <button class="btn-cancel-edit" onclick="cancelEdit()">Annuller</button>
        <button class="btn-save-edit" onclick="saveEdit('${dk}',${i})">Gem ✓</button>
      </div>
    </div>`:'';
  const col=dtlColor(e);
  const dot=`<div style="width:8px;height:8px;border-radius:50%;background:${col.bg};flex-shrink:0;margin-top:3px"></div>`;
  return`<div class="entry">
    <div class="entry-main-row">
      <div class="entry-time-col"><div class="entry-time">${e.start}</div><div class="entry-time">${e.stop}</div></div>
      <div class="entry-divider"></div>
      <div class="entry-body" style="display:flex;align-items:flex-start;gap:7px">${dot}<div><div class="entry-on">${e.on}</div>${e.cat&&e.cat!==e.on?`<div class="entry-cat">${e.cat}</div>`:''}</div></div>
      <div class="entry-dur">${fmtH(e.hours)}</div>
    </div>
    <div class="entry-actions">
      <button class="entry-btn edit" onclick="startEdit(${i})">✏️ Ret</button>
      <div class="entry-btn-sep"></div>
      <button class="entry-btn del" onclick="doDelEntry('${dk}',${i})">✕ Slet</button>
    </div>
    ${editPanel}
  </div>`;
}

// Split eksisterende entries der dækker frokost-perioden (retroaktiv oprydning)
function splitExistingForFrokost(dk){
  const fr=getFrokost(dk);
  if(!fr) return false;
  const fs=hmToH(fr.start), fe=hmToH(fr.stop);
  const arr=getEntries(dk);
  let changed=false;
  const result=[];
  arr.forEach(e=>{
    if(e.special||e.auto_special||!e.start||!e.stop){ result.push(e); return; }
    const es=hmToH(e.start), ee=hmToH(e.stop);
    if(es<fs && ee>fe){
      // Split
      result.push({...e,stop:fr.start,hours:fs-es});
      result.push({...e,start:fr.stop,hours:ee-fe});
      changed=true;
    } else {
      result.push(e);
    }
  });
  if(changed) saveEntries(dk,result);
  return changed;
}

function dagHTML(){
  const today=new Date(), dk=dateKey(today), di=todayIdx();
  if(splitExistingForFrokost(dk)) scheduleSave(); // Ret op på gamle entries der dækker frokost
  const entries=getEntries(dk);
  const dayType=getDayType(dk);
  const target=DAY_TARGET[di];
  const isSyg=dayType==='syg'||dayType==='p56', isBarnSyg=dayType==='barnsyg', isP56=dayType==='p56';
  const fr=getFrokost(dk);
  // Timer der overlapper frokost tæller kun den del der IKKE er frokost
  function effectiveHours(e){
    if(e.special||e.auto_special||e.frokost) return 0;
    if(!fr||!e.start||!e.stop) return e.hours;
    const es=hmToH(e.start),ee=hmToH(e.stop);
    const fs=hmToH(fr.start),fe=hmToH(fr.stop);
    const overlap=Math.max(0,Math.min(ee,fe)-Math.max(es,fs));
    return Math.max(0,e.hours-overlap);
  }
  const worked=entries.reduce((s,e)=>s+effectiveHours(e),0);
  const diff=worked-target;
  const pct=target>0?Math.min(100,(worked/target)*100):0;
  const sc=isSyg||isBarnSyg?'blue':diff>0.05?'good':diff<-0.05?'bad':'amber';
  const ss2=diff>0.05?'+':diff<-0.05?'-':'';
  const barClr=diff>0.05?'var(--green)':worked>0?'var(--gold)':'var(--slate)';

  const dtBtns=DAY_TYPES.map(dt=>`<button class="daytype-btn ${dayType===dt.id?dt.cls:''}" onclick="setDT('${dk}','${dt.id}')">${dt.label}</button>`).join('');

  let specialBanner=''; // Fjernet - auto-beregning klarer det

  // Totaler

    const cat=e.cat||'';  // Vis kategori uanset om den matcher ON
    if(cat) onCats[e.on][cat]=(onCats[e.on][cat]||0)+e.hours;
  });
  // Special timer (syg/barnsyg/§56)
  const specialTotals={};
  entries.forEach(e=>{ if(e.special||e.auto_special) specialTotals[e.on]=(specialTotals[e.on]||0)+e.hours; });
  const onKeys=Object.keys(onTotals);
  const spKeys=Object.keys(specialTotals);
  const summaryHTML=(onKeys.length>0||spKeys.length>0)?`
  <div class="card">
    <div class="section-label">Totaler til Promak</div>
    <div class="promak-box">
      ${onKeys.map(k=>{
        const cats=Object.entries(onCats[k]||{});
        const catRows=cats.map(([cat,h])=>`
          <div style="display:flex;justify-content:space-between;padding:2px 0 2px 16px;font-size:11px;color:var(--slate)">
            <span>${cat}</span><span style="font-family:var(--mono)">${fmtH(h)}</span>
          </div>`).join('');
        return`<div class="promak-row" style="flex-direction:column;align-items:stretch;gap:0">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700">${k}</span>
            <span style="color:var(--gold);font-family:var(--mono);font-weight:800">${fmtH(onTotals[k])}</span>
          </div>
          ${catRows}
        </div>`;
      }).join('')}
      ${spKeys.length>0?`<div style="border-top:1px solid rgba(255,255,255,.06);margin:6px 0"></div>`:''}
      ${spKeys.map(k=>`<div class="promak-row"><span style="font-weight:600;color:var(--slate)">${k}</span><span style="color:var(--slate);font-family:var(--mono);font-weight:700">${fmtH(specialTotals[k])}</span></div>`).join('')}
    </div>
  </div>`:'';

  const timerHTML=activeTimer?`
    <div class="live-card">
      <div class="live-label"><div class="live-dot"></div>Timer kører</div>
      <div class="live-project">${activeTimer.label}</div>
      <div class="live-sub">Startet kl. ${activeTimer.startHM}</div>
      <div class="live-time" id="timerDisp">0:00:00</div>
      <button class="btn btn-red" onclick="stopTimer()">■&nbsp; Stop &amp; Gem</button>
    </div>`:'';

  // Byg liste med frokost indsat på rette tidspunkt
  const frokostRow=fr?`<div class="entry" style="opacity:.65;border-left:3px solid rgba(255,255,255,.12)">
    <div class="entry-main-row">
      <div class="entry-time-col"><div class="entry-time">${fr.start}</div><div class="entry-time">${fr.stop}</div></div>
      <div class="entry-divider"></div>
      <div class="entry-body">
        <div class="entry-on" style="color:var(--slate)">🍽️ Frokost</div>
        <div class="entry-cat" style="color:var(--slate)">${Math.round((hmToH(fr.stop)-hmToH(fr.start))*60)} min · tæller ikke med</div>
      </div>
      <div class="entry-dur" style="color:var(--slate)">—</div>
    </div>
  </div>`:null;

  // Sorter entries + frokost-row sammen efter starttid
  const allRows=[];
  entries.forEach((e,i)=>allRows.push({t:hmToH(e.start),html:buildEntryHTML(e,i,dk)}));
  if(frokostRow && fr) allRows.push({t:hmToH(fr.start),html:frokostRow});
  allRows.sort((a,b)=>a.t-b.t);

    </div>
    ${target>0?`<div class="prog-wrap"><div class="prog-meta"><span>Fremdrift</span><span style="color:var(--snow)">${Math.round(pct)}%</span></div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${barClr}"></div></div></div>`:''}

  <div class="card"><div class="section-label">Dag-type</div><div class="daytype-row">${dtBtns}</div></div>

// ═══════════════════════════════════════════════════════
//  DAG TIDSLINJE — smart kombi
// ═══════════════════════════════════════════════════════
const DTL_START=6, DTL_END=22, DTL_SPAN=DTL_END-DTL_START;
function dtlPct(hm){ return Math.max(0,Math.min(100,(hmToH(hm)-DTL_START)/DTL_SPAN*100)); }
function dtlSnap(pct){
  const totalMin=Math.round((DTL_START+(pct/100)*DTL_SPAN)*60/15)*15;
  const h=Math.floor(totalMin/60),m=totalMin%60;
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function dtlGetX(ev){ return ev.clientX??ev.touches?.[0]?.clientX??0; }

// Farve-palette — hash af ON-navn → fast farve
const DTL_COLORS=[
  {bg:'#4DA6FF',fg:'#fff'},  // blå
  {bg:'#3DDC97',fg:'#071a10'}, // grøn
  {bg:'#B06EFF',fg:'#fff'},  // lilla
  {bg:'#FF9F43',fg:'#2a1500'}, // orange
  {bg:'#4CD4D4',fg:'#071a1a'}, // teal
  {bg:'#FF7EB6',fg:'#2a0015'}, // rosa
  {bg:'#A8E063',fg:'#1a2a00'}, // lime
  {bg:'#778CA8',fg:'#fff'},  // blågrå
];
const DTL_SPECIAL={
  syg:    {bg:'rgba(255,92,92,.85)',fg:'#fff'},
  barnsyg:{bg:'rgba(77,166,255,.85)',fg:'#fff'},
  p56:    {bg:'rgba(176,110,255,.85)',fg:'#fff'},
  auto_s: {bg:'rgba(255,92,92,.35)',fg:'rgba(255,255,255,.7)',dash:true},
};
// Husk ON→farve så samme ON altid får samme farve på tværs af dage
const _onColorCache={};
function dtlColor(e){
  if(e.special||e.auto_special){
    const k=e.auto_special?'auto_s':e.special;
    return DTL_SPECIAL[k]||DTL_SPECIAL.syg;
  }
  const key=e.on;
  if(!_onColorCache[key]){
    let hash=0; for(const c of key) hash=(hash*31+c.charCodeAt(0))&0xffff;
    _onColorCache[key]=DTL_COLORS[hash%DTL_COLORS.length];
  }
  return _onColorCache[key];
}

// Layout: fordel entries på rækker, undgå overlap
function dtlLayout(entries){
  const rows=[]; // array af arrays
  entries.forEach((e,i)=>{
    if(!e.start||!e.stop)return;
    const l=dtlPct(e.start), r=dtlPct(e.stop);
    if(r-l<0.15)return;
    let placed=false;
    for(const row of rows){
      const last=row[row.length-1];
      if(dtlPct(last.e.stop)<=l+0.5){ row.push({e,i,l,r}); placed=true; break; }
    }
    if(!placed) rows.push([{e,i,l,r}]);
  });
  return rows;
}

function frokostBarHTML(dk){

  const skipped=(db.frokostSkip||{})[dk];

        <button class="frokost-skip skipped" onclick="setFrokostSkip('${dk}',false)">↩ Fortryd</button>

function updateFrokost(dk){
  const s=document.getElementById('frStart')?.value;

  const mins=Math.round((hmToH(e)-hmToH(s))*60);

  if(mEl) mEl.textContent=mins>0?mins:'?';
  if(mins>0) setFrokostTime(dk,s,e);
}


function buildDagTimeline(dk,entries){
  const nowPct=dtlPct(nowHM());
  const rows=dtlLayout(entries);
  const trackH=Math.max(1,rows.length)*51; // 48px pr. række + 3px gap

  // Byg blokke per række
  const rowsHTML=rows.map((row,ri)=>{
    const blocksHTML=row.map(({e,i,l,r})=>{
      const w=r-l;
      const col=dtlColor(e);
      const border=col.dash?`border:1.5px dashed ${col.bg};background:rgba(255,92,92,.18)`:`background:${col.bg}`;
      const lbl=e.on.length>12?e.on.slice(0,11)+'…':e.on;
      // Vis tid i blokken hvis bred nok (>8%)
      const showTime=w>8;
      // Vis kun navn hvis <5%, ingenting hvis <2%
      const showName=w>2;
      return`<div class="dag-tl-block" id="dtlb-${i}" data-i="${i}"
        style="left:${l}%;width:${w}%;${border};color:${col.fg}">
        <div class="dtl-lh" data-role="L"></div>
        <div class="dtl-inner">
          ${showName?`<div class="dtl-name">${lbl}</div>`:''}
          ${showTime?`<div class="dtl-time">${e.start}–${e.stop}</div>`:''}
        </div>
        <div class="dtl-rh" data-role="R"></div>
      </div>`;
    }).join('');
    return`<div class="dag-tl-row">${blocksHTML}</div>`;
  }).join('');

  // Timemærker — tilpas tæthed til skærmbredde
  const hours=[];
  for(let h=DTL_START;h<=DTL_END;h+=2)hours.push(h);
  const hourMarks=hours.map(h=>`<div class="dag-tl-hour" style="left:${(h-DTL_START)/DTL_SPAN*100}%">${h}</div>`).join('');

  // Frokost-blok på tidslinje — resize + flyt
  const fr=getFrokost(dk);
  const frBlock=fr?(()=>{
    const fl=dtlPct(fr.start), fw=dtlPct(fr.stop)-fl;
    const mins=Math.round((hmToH(fr.stop)-hmToH(fr.start))*60);
    return`<div class="dag-tl-frokost" id="dtlFrokost" style="left:${fl}%;width:${fw}%;pointer-events:auto;display:flex;align-items:stretch;top:2px;bottom:2px">
      <div id="dtlFrL" style="width:10px;flex-shrink:0;background:rgba(255,255,255,.1);cursor:ew-resize;border-radius:5px 0 0 5px;display:flex;align-items:center;justify-content:center"><div style="width:2px;height:12px;background:rgba(255,255,255,.3);border-radius:2px"></div></div>
      <div id="dtlFrBody" style="flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.4);font-weight:700;cursor:grab;user-select:none">🍽️ ${mins}m</div>
      <div id="dtlFrR" style="width:10px;flex-shrink:0;background:rgba(255,255,255,.1);cursor:ew-resize;border-radius:0 5px 5px 0;display:flex;align-items:center;justify-content:center"><div style="width:2px;height:12px;background:rgba(255,255,255,.3);border-radius:2px"></div></div>
    </div>`;
  })():'';

  return`<div class="dag-tl-wrap">
    <div class="dag-tl-track" id="dtlTrack" style="height:${trackH}px">
      ${rowsHTML}
      ${frBlock}
      <div class="dag-tl-now" style="left:${nowPct}%;top:0;bottom:0"></div>
    </div>
    <div id="dtlTooltip" class="dag-tl-tooltip" style="opacity:0;left:50%;top:0">—</div>
    <div class="dag-tl-hours-row" style="margin-top:4px;position:relative">${hourMarks}</div>
  </div>`;
}

function bindDagTimelineHandlers(){
  const track=document.getElementById('dtlTrack');
  if(!track)return;
  const dk=dateKey(new Date());

  function showTooltip(blk,text){
    const tip=document.getElementById('dtlTooltip');
    const trackRect=track.getBoundingClientRect();
    const blkRect=blk.getBoundingClientRect();
    const midPct=((blkRect.left+blkRect.width/2)-trackRect.left)/trackRect.width*100;
    if(tip){
      tip.textContent=text;
      tip.style.left=Math.max(10,Math.min(90,midPct))+'%';
      tip.style.top=(blk.closest('.dag-tl-row').offsetTop-34)+'px';
      tip.style.opacity='1';
    }
  }
  function hideTooltip(){ const t=document.getElementById('dtlTooltip'); if(t)t.style.opacity='0'; }

  track.querySelectorAll('.dag-tl-block').forEach(blk=>{
    const i=parseInt(blk.dataset.i);

    function makeDrag(role,startX){
      const entries=getEntries(dk);
      const e=entries[i]; if(!e)return null;
      const origStart=e.start, origStop=e.stop;
      const trackW=track.getBoundingClientRect().width;
      const spanPct=dtlPct(origStop)-dtlPct(origStart);
      let lastResult=null;

      function applyDrag(curX){
        const dPct=(curX-startX)/trackW*100;
        let ns=origStart,ne=origStop;
        if(role==='M'){
          const newL=Math.max(0,Math.min(100-spanPct,dtlPct(origStart)+dPct));
          ns=dtlSnap(newL); ne=dtlSnap(newL+spanPct);
        } else if(role==='L'){
          const newL=Math.max(0,Math.min(dtlPct(origStop)-2,dtlPct(origStart)+dPct));
          ns=dtlSnap(newL); ne=origStop;
        } else {
          const newR=Math.max(dtlPct(origStart)+2,Math.min(100,dtlPct(origStop)+dPct));
          ns=origStart; ne=dtlSnap(newR);
        }
        if(hmToH(ne)<=hmToH(ns))return null;
        // Live DOM-opdatering
        const l=dtlPct(ns),w=dtlPct(ne)-l;
        blk.style.left=l+'%'; blk.style.width=w+'%';
        // Opdater tid-label inde i blokken
        const timeEl=blk.querySelector('.dtl-time');
        if(timeEl)timeEl.textContent=`${ns}–${ne}`;
        showTooltip(blk,`${ns} → ${ne}  (${fmtH(hmToH(ne)-hmToH(ns))})`);
        return lastResult={ns,ne};
      }

      function commit(){
        if(!lastResult){hideTooltip();return;}
        const arr=getEntries(dk);
        arr[i]={...arr[i],start:lastResult.ns,stop:lastResult.ne,hours:hmToH(lastResult.ne)-hmToH(lastResult.ns)};
        saveEntries(dk,arr); recalcSpecial(dk); scheduleSave();
        hideTooltip(); render();
      }
      return{applyDrag,commit};
    }

    // Mouse
    function onMD(ev,role){
      ev.preventDefault(); ev.stopPropagation();
      const drag=makeDrag(role,dtlGetX(ev)); if(!drag)return;
      const mv=ev2=>drag.applyDrag(dtlGetX(ev2));
      const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); drag.commit(); };
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    }
    // Touch
    function onTS(ev,role){
      ev.preventDefault(); ev.stopPropagation();
      const drag=makeDrag(role,dtlGetX(ev)); if(!drag)return;
      const mv=ev2=>{ ev2.preventDefault(); drag.applyDrag(dtlGetX(ev2)); };
      const up=()=>{ document.removeEventListener('touchmove',mv); document.removeEventListener('touchend',up); drag.commit(); };
      document.addEventListener('touchmove',mv,{passive:false}); document.addEventListener('touchend',up);
    }

    const lh=blk.querySelector('.dtl-lh');
    const rh=blk.querySelector('.dtl-rh');
    const inn=blk.querySelector('.dtl-inner');
    if(lh){ lh.addEventListener('mousedown',ev=>onMD(ev,'L')); lh.addEventListener('touchstart',ev=>onTS(ev,'L'),{passive:false}); }
    if(rh){ rh.addEventListener('mousedown',ev=>onMD(ev,'R')); rh.addEventListener('touchstart',ev=>onTS(ev,'R'),{passive:false}); }
    if(inn){ inn.style.pointerEvents='auto'; inn.addEventListener('mousedown',ev=>onMD(ev,'M')); inn.addEventListener('touchstart',ev=>onTS(ev,'M'),{passive:false}); }
  });

  // ── Frokost-blok: resize (L/R) + flyt (midte) ──
  const frBlk=document.getElementById('dtlFrokost');
  if(frBlk){
    const origFr=getFrokost(dk);
    if(origFr){
      function frDrag(role, startX){
        const trackW=track.getBoundingClientRect().width;
        const spanPct=dtlPct(origFr.stop)-dtlPct(origFr.start);
        let last=null;
        function apply(curX){
          const dPct=(curX-startX)/trackW*100;
          let ns=origFr.start, ne=origFr.stop;
          if(role==='M'){
            const newL=Math.max(0,Math.min(100-spanPct,dtlPct(origFr.start)+dPct));
            ns=dtlSnap(newL); ne=dtlSnap(newL+spanPct);
          } else if(role==='L'){
            const newL=Math.max(0,Math.min(dtlPct(origFr.stop)-1,dtlPct(origFr.start)+dPct));
            ns=dtlSnap(newL); ne=origFr.stop;
          } else {
            const newR=Math.max(dtlPct(origFr.start)+1,Math.min(100,dtlPct(origFr.stop)+dPct));
            ns=origFr.start; ne=dtlSnap(newR);
          }
          const newL2=dtlPct(ns), newW=dtlPct(ne)-newL2;
          frBlk.style.left=newL2+'%'; frBlk.style.width=newW+'%';
          const mins=Math.round((hmToH(ne)-hmToH(ns))*60);
          const body=document.getElementById('dtlFrBody');
          if(body) body.textContent=`🍽️ ${mins}m`;
          const tip=document.getElementById('dtlTooltip');
          if(tip){tip.textContent=`🍽️ ${ns} – ${ne}`;tip.style.left=(newL2+newW/2)+'%';tip.style.opacity='1';tip.style.top='-34px';}
          return last={ns,ne};
        }
        function commit(){
          if(last) commitFrokostDrag(dk,last.ns,last.ne);
          const tip=document.getElementById('dtlTooltip'); if(tip)tip.style.opacity='0';
          render();
        }
        return{apply,commit};
      }
      function bindFrEl(el, role){
        if(!el) return;
        el.addEventListener('mousedown',ev=>{
          ev.preventDefault(); ev.stopPropagation();
          const drag=frDrag(role,dtlGetX(ev));
          const mv=ev2=>drag.apply(dtlGetX(ev2));
          const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); drag.commit(); };
          document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
        });
        el.addEventListener('touchstart',ev=>{
          ev.preventDefault(); ev.stopPropagation();
          const drag=frDrag(role,dtlGetX(ev));
          const mv=ev2=>{ev2.preventDefault();drag.apply(dtlGetX(ev2));};
          const up=()=>{ document.removeEventListener('touchmove',mv); document.removeEventListener('touchend',up); drag.commit(); };
          document.addEventListener('touchmove',mv,{passive:false}); document.addEventListener('touchend',up);
        },{passive:false});
      }
      bindFrEl(document.getElementById('dtlFrL'),'L');
      bindFrEl(document.getElementById('dtlFrR'),'R');
      bindFrEl(document.getElementById('dtlFrBody'),'M');
    }
  }
}

const FROKOST_DEFAULT_START='12:00';
const FROKOST_DEFAULT_STOP ='12:30';

function getFrokost(dk){
  // Returnerer {start,stop} eller null hvis sprunget over
  const d=new Date(dk);
  const dow=d.getDay(); // 0=sun,6=sat
  if(dow===0||dow===6) return null; // Ingen frokost i weekend
  const skipped=(db.frokostSkip||{})[dk];
  if(skipped) return null;
  const custom=(db.frokostCustom||{})[dk];
  return custom||{start:FROKOST_DEFAULT_START,stop:FROKOST_DEFAULT_STOP};
}

function setFrokostSkip(dk,skip){
  if(!db.frokostSkip) db.frokostSkip={};
  if(skip) db.frokostSkip[dk]=true;
  else delete db.frokostSkip[dk];
  scheduleSave(); render();
}

function setFrokostTime(dk,start,stop){
  if(!db.frokostCustom) db.frokostCustom={};
  db.frokostCustom[dk]={start,stop};
  // Opdater tidslinje-blok direkte uden fuld re-render
  const frBlk=document.getElementById('dtlFrokost');
  if(frBlk){
    const fl=dtlPct(start), fw=dtlPct(stop)-fl;
    frBlk.style.left=fl+'%'; frBlk.style.width=fw+'%';
    const body=document.getElementById('dtlFrBody');
    const mins=Math.round((hmToH(stop)-hmToH(start))*60);
    if(body) body.textContent=`🍽️ ${mins}m`;
  }
  scheduleSave();
}

// Kaldes fra bindDagTimelineHandlers efter frokost-drag
function commitFrokostDrag(dk,ns,ne){
  if(!db.frokostCustom) db.frokostCustom={};
  db.frokostCustom[dk]={start:ns,stop:ne};
  scheduleSave();
}

// Tjek om en aktiv timer overlapper frokost og split den
function checkSplitForFrokost(dk){
  if(!activeTimer) return;
  const fr=getFrokost(dk);
  if(!fr) return;
  const timerStart=hmToH(activeTimer.startHM);
  const frStart=hmToH(fr.start);
  const frStop =hmToH(fr.stop);
  const nowH=hmToH(nowHM());
  // Timeren er startet INDEN frokost og nu ER vi forbi frokost
  if(timerStart<frStart && nowH>frStop){
    // Split: gem entry frem til frokost, genstart efter frokost
    const entryBefore={
      on:activeTimer.on, cat:activeTimer.cat||'',
      start:activeTimer.startHM, stop:fr.start,
      hours:frStart-timerStart, date:dk
    };
    if(activeTimer.special) entryBefore.special=activeTimer.special;
    addEntry(dk,entryBefore);
    // Genstart timeren fra frokostslut
    activeTimer={...activeTimer, startHM:fr.stop, t0:Date.now()-(nowH-frStop)*3600000};
    localStorage.setItem('vct_activeTimer',JSON.stringify(activeTimer));
    scheduleSave();
    toast(`🍽️ Frokost trukket fra — ${activeTimer.on} fortsætter fra ${fr.stop}`,'ok');
    render();
  }
}

// Kør frokost-split-tjek hvert minut
setInterval(()=>{
  if(activeTimer){
    const dk=dateKey(new Date());
    checkSplitForFrokost(dk);
  }
},60000);

function recalcSpecial(dk){
  const type=getDayType(dk);
  // Fjern ALTID gamle auto-entries
  const normal=getEntries(dk).filter(e=>!e.auto_special);
  if(!['syg','barnsyg','p56'].includes(type)){
    saveEntries(dk,normal);
    return;
  }
  const d=new Date(dk), di=(d.getDay()+6)%7;
  const target=DAY_TARGET[di]||7.5;
  // Kun normale (ikke-special) entries tæller mod mål
  const normalOnly=normal.filter(e=>!e.special);
  const workedH=normalOnly.reduce((s,e)=>s+e.hours,0);
  const remaining=Math.max(0,target-workedH);
  const result=[...normal];
  if(remaining>0.1){
    let lastStop='07:00';
    if(normal.length>0){
      const stops=normal.map(e=>e.stop).filter(Boolean).sort();
      if(stops.length>0) lastStop=stops[stops.length-1];
    }
    const [sh,sm]=lastStop.split(':').map(Number);
    const stopMin=sh*60+sm+Math.round(remaining*60);
    const stopStr=`${String(Math.floor(stopMin/60)).padStart(2,'0')}:${String(stopMin%60).padStart(2,'0')}`;
    const label=type==='syg'?'Syg':type==='barnsyg'?'Barn syg':'§56';
    result.push({on:label,cat:'',start:lastStop,stop:stopStr,hours:remaining,date:dk,special:type,auto_special:true});
  }
  saveEntries(dk,result);
}

function stopTimer(){

  const fr=getFrokost(dk);

// ── TIDSLINJE EDITOR (Tilføj-siden) ─────────────────────────────────
const TL_START = 6;   // 06:00
const TL_END   = 20;  // 20:00
const TL_SPAN  = TL_END - TL_START;

function tlPct(hhmm){
  const h=hmToH(hhmm);
  return Math.max(0,Math.min(100,(h-TL_START)/TL_SPAN*100));
}
function tlHHMM(pct){
  const h=TL_START+(pct/100)*TL_SPAN;
  const totalMin=Math.round(h*60/15)*15;
  return`${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
}

function buildTimelineEditor(dk){
  const entries=getEntries(dk);
  const now=nowHM();
  const nowPct=tlPct(now);

  // Eksisterende blokke (pointer-events:none via CSS, klik håndteres ikke her)
  const blocks=entries.map(e=>{
    const left=tlPct(e.start), right=tlPct(e.stop), width=right-left;
    if(width<=0)return'';
    const cls=e.special?e.special:'normal';
    const lbl=e.on.length>8?e.on.slice(0,7)+'…':e.on;
    return`<div class="timeline-block ${cls}" style="left:${left}%;width:${width}%">${width>8?lbl:''}</div>`;
  }).join('');

  const nowLine=`<div class="timeline-now" style="left:${nowPct}%"></div>`;

  // Timemærker
  const hours=[];
  for(let h=TL_START;h<=TL_END;h+=2)hours.push(h);
  const hourMarks=hours.map(h=>`<div class="timeline-hour" style="left:${(h-TL_START)/TL_SPAN*100}%;position:absolute;transform:translateX(-50%)">${h}</div>`).join('');

  // Byg selector HTML hvis vi har en gyldig start+stop
  const s=tilfoejStart||'07:00', e2=tilfoejStop||now;
  const sl=tlPct(s), sr=tlPct(e2), sw=sr-sl;
  const selHTML=sw>0.5?`
    <div class="tl-sel" id="tlSel" style="left:${sl}%;width:${sw}%">
      <div class="tl-handle left" id="tlHandleL"></div>
      <div class="tl-body" id="tlBody">${s}–${e2}</div>
      <div class="tl-handle right" id="tlHandleR"></div>
    </div>`:'';

  return`
  <div style="margin-bottom:4px">
    <div class="section-label" style="margin-bottom:6px">Tidslinje — træk for at vælge · kanter = juster · midte = flyt</div>
    <div class="timeline-wrap">
      <div class="timeline-track" id="tlTrack">
        ${blocks}${selHTML}${nowLine}
      </div>
      <div style="position:relative;height:16px;margin-top:2px">${hourMarks}</div>
    </div>
    <div id="tlHint" style="font-size:11px;color:var(--gold);text-align:center;margin-top:4px;min-height:16px">${sw>0.5?s+' → '+e2:''}</div>
  </div>`;
}

function updateTlSel(){
  const s=tilfoejStart||'07:00';
  const e=tilfoejStop||nowHM();
  const sl=tlPct(s),sr=tlPct(e),sw=Math.max(0,sr-sl);
  const track=document.getElementById('tlTrack');
  if(!track)return;
  let sel=document.getElementById('tlSel');
  if(!sel){
    // Opret selector med handles og body
    sel=document.createElement('div'); sel.id='tlSel'; sel.className='tl-sel';
    const hl=document.createElement('div'); hl.id='tlHandleL'; hl.className='tl-handle left';
    const body=document.createElement('div'); body.id='tlBody'; body.className='tl-body';
    const hr=document.createElement('div'); hr.id='tlHandleR'; hr.className='tl-handle right';
    sel.appendChild(hl); sel.appendChild(body); sel.appendChild(hr);
    track.appendChild(sel);
    bindSelHandlers();
  }
  sel.style.left=sl+'%'; sel.style.width=sw+'%';
  const body=document.getElementById('tlBody');
  if(body) body.textContent=`${s}–${e}`;
  const hint=document.getElementById('tlHint');
  if(hint) hint.textContent=`${s} → ${e}`;
  // Sync input fields
  const ms=document.getElementById('mStart'),me=document.getElementById('mStop');
  if(ms)ms.value=s; if(me)me.value=e;
}

function tlGetX(ev){ return ev.clientX??ev.touches?.[0]?.clientX??0; }
function tlPctFromX(x){
  const track=document.getElementById('tlTrack'); if(!track)return 0;
  const rect=track.getBoundingClientRect();
  return Math.max(0,Math.min(100,(x-rect.left)/rect.width*100));
}
function tlSnap(pct){ // snap til 15 min
  const h=TL_START+(pct/100)*TL_SPAN;
  const totalMin=Math.round(h*60/15)*15;
  const hh=Math.floor(totalMin/60),mm=totalMin%60;
  return{hm:`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`,pct:(totalMin/60-TL_START)/TL_SPAN*100};
}

function bindSelHandlers(){
  const track=document.getElementById('tlTrack'); if(!track)return;

  // ── Track mousedown — opret nyt interval ved klik på tomt område ──
  track.addEventListener('mousedown', ev=>{
    if(ev.target.closest('.tl-sel'))return; // Ignorer klik på selector
    ev.preventDefault();
    const anchor=tlSnap(tlPctFromX(tlGetX(ev)));
    tilfoejStart=anchor.hm; tilfoejStop=anchor.hm;
    updateTlSel();
    const move=ev2=>{
      const cur=tlSnap(tlPctFromX(tlGetX(ev2)));
      const aH=hmToH(anchor.hm),cH=hmToH(cur.hm);
      tilfoejStart=aH<=cH?anchor.hm:cur.hm;
      tilfoejStop =aH<=cH?cur.hm:anchor.hm;
      updateTlSel();
    };
    const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  });
  track.addEventListener('touchstart', ev=>{
    if(ev.target.closest('.tl-sel'))return;
    ev.preventDefault();
    const anchor=tlSnap(tlPctFromX(tlGetX(ev)));
    tilfoejStart=anchor.hm; tilfoejStop=anchor.hm; updateTlSel();
    const move=ev2=>{ ev2.preventDefault();
      const cur=tlSnap(tlPctFromX(tlGetX(ev2)));
      const aH=hmToH(anchor.hm),cH=hmToH(cur.hm);
      tilfoejStart=aH<=cH?anchor.hm:cur.hm; tilfoejStop=aH<=cH?cur.hm:anchor.hm;
      updateTlSel();
    };
    const up=()=>{ track.removeEventListener('touchmove',move); track.removeEventListener('touchend',up); };
    track.addEventListener('touchmove',move,{passive:false}); track.addEventListener('touchend',up);
  },{passive:false});

  // ── Hjælpefunktion til at lave drag-handler for handle/body ──
  function makeDragHandler(getNewTimes){
    return function startDrag(ev){
      ev.preventDefault(); ev.stopPropagation();
      const startX=tlGetX(ev);
      const origStart=tilfoejStart, origStop=tilfoejStop;
      const move=ev2=>{
        const dx=tlGetX(ev2)-startX;
        const dPct=dx/(document.getElementById('tlTrack').getBoundingClientRect().width)*100;
        const {newStart,newStop}=getNewTimes(origStart,origStop,dPct);
        if(newStart&&newStop&&hmToH(newStop)>hmToH(newStart)){
          tilfoejStart=newStart; tilfoejStop=newStop; updateTlSel();
        }
      };
      const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); };
      document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
    };
  }
  function makeTouchDragHandler(getNewTimes){
    return function startDrag(ev){
      ev.preventDefault(); ev.stopPropagation();
      const startX=tlGetX(ev);
      const origStart=tilfoejStart, origStop=tilfoejStop;
      const trackW=document.getElementById('tlTrack').getBoundingClientRect().width;
      const move=ev2=>{ ev2.preventDefault();
        const dPct=(tlGetX(ev2)-startX)/trackW*100;
        const {newStart,newStop}=getNewTimes(origStart,origStop,dPct);
        if(newStart&&newStop&&hmToH(newStop)>hmToH(newStart)){
          tilfoejStart=newStart; tilfoejStop=newStop; updateTlSel();
        }
      };
      const up=()=>{ document.getElementById('tlHandleL')?.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); };
      document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up);
    };
  }

  // ── Venstre håndtag — resize start ──
  function resizeStart(origStart,origStop,dPct){
    const newPct=Math.max(0,Math.min(tlPct(origStop)-2, tlPct(origStart)+dPct));
    return{newStart:tlSnap(newPct).hm, newStop:origStop};
  }
  // ── Højre håndtag — resize stop ──
  function resizeStop(origStart,origStop,dPct){
    const newPct=Math.max(tlPct(origStart)+2,Math.min(100, tlPct(origStop)+dPct));
    return{newStart:origStart, newStop:tlSnap(newPct).hm};
  }
  // ── Midte — flyt hele interval ──
  function moveInterval(origStart,origStop,dPct){
    const span=tlPct(origStop)-tlPct(origStart);
    const newL=Math.max(0,Math.min(100-span, tlPct(origStart)+dPct));
    const newR=newL+span;
    return{newStart:tlSnap(newL).hm, newStop:tlSnap(newR).hm};
  }

  setTimeout(()=>{ // setTimeout fordi elementerne kan være netop oprettet
    document.getElementById('tlHandleL')?.addEventListener('mousedown', makeDragHandler(resizeStart));
    document.getElementById('tlHandleR')?.addEventListener('mousedown', makeDragHandler(resizeStop));
    document.getElementById('tlBody')?.addEventListener('mousedown', makeDragHandler(moveInterval));
    document.getElementById('tlHandleL')?.addEventListener('touchstart', makeTouchDragHandler(resizeStart),{passive:false});
    document.getElementById('tlHandleR')?.addEventListener('touchstart', makeTouchDragHandler(resizeStop),{passive:false});
    document.getElementById('tlBody')?.addEventListener('touchstart', makeTouchDragHandler(moveInterval),{passive:false});
  },0);
}

// ─────────────────────────────────────────────────────────────────────
function checkOverlap(dk, newStart, newStop){
  const entries = getEntries(dk);
  const ns = hmToH(newStart), ne = hmToH(newStop);
  for(const e of entries){
    const es = hmToH(e.start), ee = hmToH(e.stop);
    if(ns < ee && ne > es){
      return `Overlapper med ${e.on} (${e.start}–${e.stop})`;
    }
  }
  return null;
}

function saveManual(){
  const start=document.getElementById('mStart').value,stop=document.getElementById('mStop').value;
  if(!start||!stop){toast('Udfyld start og stop','err');return;}
  const sh=hmToH(start),eh=hmToH(stop);
  if(eh<=sh){toast('Stop skal være efter start','err');return;}
  // Bestem ON: kategori/ON kan kombineres med syg
  const baseOn=customOn||selOn||selCat;
  const on=baseOn||( selSpecial?(selSpecial==='syg'?'Syg':selSpecial==='barnsyg'?'Barn syg':'§56'):null);
  if(!on){toast('Vælg kategori eller ON-nummer','err');return;}
  const dk=dateKey(new Date());
  const overlap = checkOverlap(dk, start, stop);
  if(overlap){toast('⚠️ '+overlap,'err');return;}
  // Split rundt om frokost hvis perioden dækker den
  const fr=getFrokost(dk);
  if(fr && sh<hmToH(fr.start) && eh>hmToH(fr.stop)){
    const e1={on,cat:selCat,start,stop:fr.start,hours:hmToH(fr.start)-sh,date:dk};
    const e2={on,cat:selCat,start:fr.stop,stop,hours:eh-hmToH(fr.stop),date:dk};
    if(selSpecial){e1.special=selSpecial;e2.special=selSpecial;}
    addEntry(dk,e1); addEntry(dk,e2);
    recalcSpecial(dk); savePulse();
    toast(`✓ ${on} — frokost 🍽️ trukket fra`,'ok'); tab('dag');
    return;
  }
  const entry={on,cat:selCat,start,stop,hours:eh-sh,date:dk};
  if(selSpecial)entry.special=selSpecial;
  addEntry(dk,entry); recalcSpecial(dk); savePulse(); toast(`✓ ${on}  ${start}–${stop}`,'ok'); tab('dag');
}

function ugeHTML(){
  const now=new Date(),mon=monday(now),ti=todayIdx();
  let totalH=0,officeDays=0,homeDays=0,sygDays=0,barnSygDays=0,ferieDays=0;
  const daysHTML=DAY_S.map((name,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const dk=dateKey(d);
    const entries=getEntries(dk);
    const type=getDayType(dk);
    const h=entries.reduce((s,e)=>s+e.hours,0);
    const target=DAY_TARGET[i];
    if(i<5){
      if(type==='syg'||type==='p56') sygDays++;
      else if(type==='barnsyg') barnSygDays++;
      else if(type==='ferie') ferieDays++;
      else if(h>0){totalH+=h;type==='hjemme'?homeDays++:officeDays++;}
    }
    const pct=target>0?Math.min(100,(h/target)*100):0;
    const diff=h-target;
    const isToday=i===ti,isPast=i<ti&&i<5;
    const isSygDay=type==='syg'||type==='p56',isBarnSygDay=type==='barnsyg',isP56Day=type==='p56';
    const barClr=isSygDay||isBarnSygDay?'var(--blue)':h>=target?'var(--green)':h>0?'var(--gold)':'transparent';
    const rowCls=isSygDay?'syg-day':isBarnSygDay?'barnsyg-day':isToday?'today':'';
    let diffHTML='';
    if(isSygDay)          diffHTML=`<div class="wr-diff" style="color:var(--red)">${isP56Day?'§56':'🤒 Sygedag'}</div>`;
    else if(isBarnSygDay) diffHTML=`<div class="wr-diff" style="color:var(--blue)">👶 Barn syg</div>`;
    else if(type==='ferie') diffHTML=`<div class="wr-diff" style="color:var(--green)">🌴 Ferie</div>`;
    else if((isPast||isToday)&&h>0){
      const dc=diff>=0?'color:var(--green)':'color:var(--amber)';
      diffHTML=`<div class="wr-diff" style="${dc}">${diff>=0?'+':'-'}${fmtH(Math.abs(diff))}</div>`;
    }
    // Dag-totaler per ON med farver
    const ugeTotals={};
    const ugeCats={};
    entries.forEach(e=>{
      if(e.auto_special) return;
      ugeTotals[e.on]=(ugeTotals[e.on]||0)+e.hours;
      if(!ugeCats[e.on]) ugeCats[e.on]={};
      const cat=e.cat||'';
      if(cat) ugeCats[e.on][cat]=(ugeCats[e.on][cat]||0)+e.hours;
    });
    const entryRows=Object.entries(ugeTotals).map(([k,v])=>{
      const col=dtlColor({on:k,special:null});
      const cats=Object.entries(ugeCats[k]||{});
      const catRows=cats.map(([cat,h])=>`
        <div style="padding:1px 0 1px 20px;font-size:11px;color:var(--slate);display:flex;justify-content:space-between">
          <span>${cat}</span><span style="font-family:var(--mono)">${fmtH(h)}</span>
        </div>`).join('');
      return`<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${col.bg};flex-shrink:0"></div>
          <span style="flex:1;font-size:12px;font-weight:600">${k}</span>
          <span style="color:var(--gold);font-family:var(--mono);font-size:12px;font-weight:700">${fmtH(v)}</span>
        </div>
        ${catRows}
      </div>`;
    }).join('');

    // Mini tidslinje for dagen (06-20, kun farveblokke)
    const miniBlocks=entries.map(e=>{
      if(!e.start||!e.stop)return'';
      const l=dtlPct(e.start),w2=dtlPct(e.stop)-l;
      if(w2<0.5)return'';
      const col=dtlColor(e);
      return`<div style="position:absolute;top:2px;bottom:2px;left:${l}%;width:${w2}%;background:${col.bg};border-radius:3px"></div>`;
    }).join('');
    const miniTl=entries.length>0?`
      <div style="position:relative;height:14px;background:rgba(255,255,255,.04);border-radius:4px;margin:6px 0 2px;overflow:hidden">
        ${miniBlocks}
      </div>`:'';

    return`<div class="week-row ${rowCls}">
      <div class="wr-hdr" onclick="toggleDay('wd-${dk}')">
        <div class="wr-day"><div class="wr-name">${name}</div><div class="wr-date">${d.getDate()}/${d.getMonth()+1}</div></div>
        <div class="wr-mid">
          <div class="wr-bar-row"><span>${type==='hjemme'?'🏠':type==='syg'?'🤒':type==='barnsyg'?'👶':type==='p56'?'§':type==='ferie'?'🌴':'🏢'}</span><span>${h>0?fmtH(h):'—'}</span></div>
          <div class="wr-bar-bg"><div class="wr-bar-fill" style="width:${pct}%;background:${barClr}"></div></div>
          ${diffHTML}
        </div>
        <div class="wr-right">${isToday?'<div class="wr-badge">I dag</div>':''}${entries.length>0?`<div style="font-size:10px;color:var(--slate);margin-top:2px">▼ ${entries.length}</div>`:''}</div>
      </div>
      ${entries.length>0?`<div class="wr-body" id="wd-${dk}">${miniTl}${entryRows}</div>`:''}
    </div>`;
  }).join('');
  const wDiff=totalH-(7.5*4+6.5);
  const exportHTML=buildUgeExport(mon);
  return`
  <div class="card">
    <div class="section-label">Uge ${weekNum(now)} · oversigt</div>
    <div class="week-summary">
      <div class="ws"><div class="ws-val">${fmtH(totalH)}</div><div class="ws-lbl">Arbejdet</div></div>
      <div class="ws"><div class="ws-val" style="${wDiff>=0?'color:var(--green)':'color:var(--red)'}">${wDiff>=0?'+':'-'}${fmtH(Math.abs(wDiff))}</div><div class="ws-lbl">${wDiff>=0?'Overarb.':'Mangler'}</div></div>

      <div class="ws"><div class="ws-val">🏠 ${homeDays}</div><div class="ws-lbl">Hjemme</div></div>
      ${sygDays>0?`<div class="ws"><div class="ws-val" style="color:var(--red)">🤒 ${sygDays}</div><div class="ws-lbl">Syg/§56</div></div>`:''}
      ${barnSygDays>0?`<div class="ws"><div class="ws-val" style="color:var(--blue)">👶 ${barnSygDays}</div><div class="ws-lbl">Barn syg</div></div>`:''}
      ${ferieDays>0?`<div class="ws"><div class="ws-val" style="color:var(--green)">🌴 ${ferieDays}</div><div class="ws-lbl">Feriedage</div></div>`:''}
    </div>

}

function buildUgeExport(mon){
  const totals={};
  for(let i=0;i<5;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    for(const e of getEntries(dateKey(d))){
      if(e.special)continue;
      totals[e.on]=(totals[e.on]||0)+e.hours;

  const keys=Object.keys(totals);
  if(!keys.length)return'';
  const txt=keys.map(k=>`${k}: ${fmtH(totals[k])}`).join('\n');

const OUTLOOK_ICS = 'https://outlook.office365.com/owa/calendar/e56d83353543442bb9b3f286e4efc118@vestergaardcompany.com/bf3e9209c7c04724995694304cd2bb209642795787987125204/calendar.ics';

async function importOutlook(){
  toast('Henter kalender...','');
  // Prøv flere CORS proxies
  const proxies = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
    'https://proxy.cors.sh/',
  ];
  let icsText = null;
  for(const proxy of proxies){
    try {
      const r = await fetch(proxy + encodeURIComponent(OUTLOOK_ICS), {signal: AbortSignal.timeout(8000)});
      if(r.ok){ icsText = await r.text(); break; }
    } catch{}
  }
  if(icsText && icsText.includes('VCALENDAR')){
    const result = parseICS(icsText);
    toast(`✓ ${result.ferie} feriedage importeret`,'ok');
    scheduleSave();
    render();
  } else {
    toast('Prøv manuel upload i stedet','err');
    setTimeout(()=>uploadICS(), 1000);
  }
}

function uploadICS(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.ics';
  input.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    const text=await file.text();
    const result=parseICS(text);
    toast(`✓ ${result.ferie} feriedage, ${result.helligdag} helligdage importeret`,'ok');
    scheduleSave();
    render();
  };
  input.click();
}

function parseICS(text){
  // Unfold wrapped lines (ICS linjeskift med mellemrum/tab)
  text = text.replace(/\r?\n[ \t]/g, '');
  const lines = text.split(/\r?\n/);
  let inEvent=false, current={};
  let ferieCount=0;

  for(let i=0; i<lines.length; i++){
    const line = lines[i];
    if(line==='BEGIN:VEVENT'){ inEvent=true; current={}; continue; }
    if(line==='END:VEVENT'){
      inEvent=false;
      if(current.start){
        const before = ferieCount;
        processICSEvent(current);
        // Tæl kun hvis processICSEvent faktisk satte noget
        const s=(current.summary||'').toLowerCase();
        if(s.includes('ferie')||s.includes('fravær')) ferieCount++;
      }
      continue;
    }
    if(!inEvent) continue;

    // DTSTART - håndter både DATE og DATETIME format
    if(line.startsWith('DTSTART')){
      const val = line.includes(':') ? line.split(':').slice(1).join(':').trim() : '';
      if(val) current.start = val.substring(0,8); // Tag kun YYYYMMDD
    }
    if(line.startsWith('DTEND')){
      const val = line.includes(':') ? line.split(':').slice(1).join(':').trim() : '';
      if(val) current.end = val.substring(0,8);
    }
    if(line.startsWith('SUMMARY:')){
      current.summary = line.substring(8).trim();
    }
    // Håndter encoded tegn
    if(line.startsWith('SUMMARY;')){
      const idx = line.indexOf(':');
      if(idx>-1) current.summary = line.substring(idx+1).trim();
    }
  }
  return {ferie: ferieCount};
}

function processICSEvent(evt){
  const summary=(evt.summary||'').toLowerCase();
  const isFerie    = summary.includes('ferie');
  const isSyg      = summary.includes('syg')||summary.includes('sygdom');
  const isBarnSyg  = summary.includes('barn') && summary.includes('syg');
  const isHolyday  = summary.includes('helligdag')||summary.includes('fridag')||
                     summary.includes('holiday')||summary.includes('1. mai')||
                     summary.includes('grundlovsdag')||summary.includes('juledag')||
                     summary.includes('nytår')||summary.includes('påske')||
                     summary.includes('pinse')||summary.includes('kristi');
  const isFravær   = summary.includes('fravær')||summary.includes('fraværende')||
                     summary.includes('absent')||summary.includes('out of office')||
                     summary.includes('ikke på kontoret');

  if(!isFerie && !isHolyday && !isSyg && !isBarnSyg && !isFravær) return;

  let type = 'fri';
  if(isBarnSyg)   type = 'barnsyg';
  else if(isSyg)  type = 'syg';
  else if(isFerie||isFravær) type = 'ferie';

  // Parse dato fra ICS format YYYYMMDD
  function parseICSDate(s){
    if(!s) return null;
    const clean=s.substring(0,8);
    if(clean.length!==8) return null;
    return `${clean.slice(0,4)}-${clean.slice(4,6)}-${clean.slice(6,8)}`;
  }

  const startDk=parseICSDate(evt.start);
  const endDk=parseICSDate(evt.end);
  if(!startDk) return;

  // Sæt alle dage i perioden
  const start=new Date(startDk);
  const end=endDk?new Date(endDk):new Date(startDk);
  end.setDate(end.getDate()-1); // ICS DTEND er exclusive

  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const di=d.getDay();
    if(di===0||di===6) continue; // Skip weekend
    const dk=dateKey(new Date(d));
    // Sæt kun hvis dagen ikke allerede har timer
    const entries=getEntries(dk);
    if(entries.length===0){
      setDayType(dk, type);
    }
  }
}

function saveFerie(){
  const from=document.getElementById('ferieFrom').value;
  const to=document.getElementById('ferieTo').value;
  if(!from||!to){toast('Vælg datoer','err');return;}
  const start=new Date(from), end=new Date(to);
  if(end<start){toast('Slutdato skal være efter startdato','err');return;}
  let count=0;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const di=d.getDay();
    if(di===0||di===6) continue; // Spring weekend over
    const dk=dateKey(new Date(d));
    setDayType(dk,'ferie');
    count++;
  }
  document.getElementById('ferieModal')?.remove();
  toast(`🌴 ${count} feriedage registreret`,'ok');
  render();
}
