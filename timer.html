function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      const src=data.days||{};
      let count=0;
      Object.keys(src).forEach(dk=>{
        const day=src[dk];
        if(!db.days[dk]) db.days[dk]={entries:[],type:'kontor'};
        if(day.type&&day.type!=='kontor') db.days[dk].type=day.type;
        const existing=db.days[dk].entries||[];
        const existKeys=new Set(existing.map(e=>e.start+e.on));
        const newE=(day.entries||[]).filter(e=>!existKeys.has(e.start+e.on));
        db.days[dk].entries=[...existing,...newE];
        count+=newE.length;
      });
      scheduleSave();
      toast(`✓ ${count} registreringer importeret`,'ok');
      render();
    }catch(err){toast('Fejl: '+err.message,'err');}
  };
  input.click();
}

let kalMonth = new Date().getMonth();
let kalYear  = new Date().getFullYear();

function kalenderHTML(){
  const now   = new Date();
  const today = dateKey(now);
  const firstDay = new Date(kalYear, kalMonth, 1);
  const lastDay  = new Date(kalYear, kalMonth+1, 0);
  const startDow = (firstDay.getDay()+6)%7; // 0=Man
  const MONTHS_L = ['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'];
  const DAY_LABELS = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];

  // Dag-navne header
  const dayNames = '<div class="kal-day-name" style="opacity:0">U</div>' + DAY_LABELS.map(d=>`<div class="kal-day-name">${d}</div>`).join('');

  // Tomme celler før første dag
  let cells = '';
  let currentWeekDay = 0; // 0=Man

  // Første uge-nummer
  const firstWeekDate = new Date(kalYear, kalMonth, 1-startDow);
  cells += `<div class="kal-week-num">${weekNum(firstWeekDate)}</div>`;

  for(let i=0;i<startDow;i++){
    const prevDate = new Date(kalYear,kalMonth,1-startDow+i);
    cells += `<div class="kal-cell other-month"><div class="kal-date" style="color:var(--slate)">${prevDate.getDate()}</div></div>`;
    currentWeekDay++;
  }

  // Dage i måneden
  for(let d=1;d<=lastDay.getDate();d++){
    const date = new Date(kalYear,kalMonth,d);
    const dk   = dateKey(date);
    const dow  = (date.getDay()+6)%7; // 0=Man
    const isWeekend = dow>=5;
    const isToday   = dk===today;
    const type = getDayType(dk);
    const entries = getEntries(dk);
    const hasWork = entries.length>0;
    const workedH = entries.reduce((s,e)=>s+e.hours,0);

    let cls = 'kal-cell';
    if(isWeekend) cls+=' weekend';
    if(isToday)   cls+=' today';
    if(type==='ferie')    cls+=' has-ferie';
    else if(type==='syg'||type==='p56') cls+=' has-syg';
    else if(type==='barnsyg') cls+=' has-barnsyg';
    else if(type==='fri') cls+=' has-fri';
    else if(hasWork && type==='hjemme') cls+=' has-hjemme';
    else if(hasWork) cls+=' has-kontor';

    // Ikon
    let icon = '';
    if(type==='ferie')         icon = '🌴';
    else if(type==='syg')      icon = '🤒';
    else if(type==='p56')      icon = '§';
    else if(type==='barnsyg')  icon = '👶';
    else if(type==='fri')      icon = '🎉';
    else if(hasWork && type==='hjemme') icon = '🏠';
    else if(hasWork)           icon = '🏢';

    // Timer tekst
    const hoursText = hasWork && !['ferie','syg','barnsyg','fri','p56'].includes(type)
      ? `<div style="font-size:9px;text-align:center;color:var(--gold);font-family:var(--mono)">${fmtH(workedH)}</div>`
      : '';

    // Ny uge?
    const cellDow = (date.getDay()+6)%7;
    if(cellDow===0 && d>1){
      cells += `<div class="kal-week-num">${weekNum(date)}</div>`;
    }

    cells += `<div class="${cls}" onclick="kalDayClick('${dk}')">
      <div class="kal-date" style="${isToday?'color:var(--gold)':''}">${d}</div>
      ${icon?`<div style="text-align:center;font-size:13px;line-height:1">${icon}</div>`:''}
      ${hoursText}
    </div>`;
  }

  // Tomme celler efter sidste dag
  const remaining = (7 - (startDow + lastDay.getDate()) % 7) % 7;
  if(remaining > 0){
    const nextWeekDate = new Date(kalYear, kalMonth+1, 1);
    cells += `<div class="kal-week-num">${weekNum(nextWeekDate)}</div>`;
    for(let i=1;i<=remaining;i++){
      cells += `<div class="kal-cell other-month"><div class="kal-date" style="color:var(--slate)">${i}</div></div>`;
    }
  }

  // Måneds-statistik
  let mFerie=0,mSyg=0,mBarnSyg=0,mKontor=0,mHjemme=0,mTimer=0;
  for(let d=1;d<=lastDay.getDate();d++){
    const date=new Date(kalYear,kalMonth,d);
    const dow=(date.getDay()+6)%7;
    if(dow>=5) continue;
    const dk=dateKey(date);
    const type=getDayType(dk);
    const h=getEntries(dk).reduce((s,e)=>s+e.hours,0);
    if(type==='ferie') mFerie++;
    else if(type==='syg'||type==='p56') mSyg++;
    else if(type==='barnsyg') mBarnSyg++;
    else if(h>0){ mTimer+=h; type==='hjemme'?mHjemme++:mKontor++; }
  }

  return`
  <div class="card">
    <div class="kal-header">
      <button class="kal-nav" onclick="kalPrev()">‹</button>
      <div class="kal-title">${MONTHS_L[kalMonth]} ${kalYear}</div>
      <button class="kal-nav" onclick="kalNext()">›</button>
    </div>
    <div class="kal-grid">
      ${dayNames}
      ${cells}
    </div>
    <div class="kal-legend">
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(61,220,151,.4)"></div>Kontor</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(245,172,0,.3)"></div>Hjemme</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(61,220,151,.4);opacity:.6"></div>Ferie</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(255,92,92,.4)"></div>Syg</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(77,166,255,.4)"></div>Barn syg</div>
    </div>
  </div>
  <div class="card">
    <div class="section-label">${MONTHS_L[kalMonth]} · Statistik</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
      <div class="stat-box"><div class="stat-num white">${fmtH(mTimer)}</div><div class="stat-lbl">Timer</div></div>
      <div class="stat-box"><div class="stat-num white">🏢 ${mKontor}</div><div class="stat-lbl">Kontor</div></div>
      <div class="stat-box"><div class="stat-num white">🏠 ${mHjemme}</div><div class="stat-lbl">Hjemme</div></div>
      ${mFerie>0?`<div class="stat-box"><div class="stat-num good">🌴 ${mFerie}</div><div class="stat-lbl">Ferie</div></div>`:''}
      ${mSyg>0?`<div class="stat-box"><div class="stat-num bad">🤒 ${mSyg}</div><div class="stat-lbl">Syg</div></div>`:''}
      ${mBarnSyg>0?`<div class="stat-box"><div class="stat-num blue">👶 ${mBarnSyg}</div><div class="stat-lbl">Barn syg</div></div>`:''}
    </div>
  </div>`;
}

function kalPrev(){ kalMonth--; if(kalMonth<0){kalMonth=11;kalYear--;} render(); }
function kalNext(){ kalMonth++; if(kalMonth>11){kalMonth=0;kalYear++;} render(); }
function kalDayClick(dk){
  // Naviger til dag og skift til I dag view
  // Vis dag-detaljer som toast
  const type=getDayType(dk);
  const entries=getEntries(dk);
  const h=entries.reduce((s,e)=>s+e.hours,0);
  const icons={kontor:'🏢',hjemme:'🏠',ferie:'🌴',syg:'🤒',barnsyg:'👶',p56:'§56',fri:'🎉'};
  const icon=icons[type]||'🏢';
  const msg = h>0 ? `${icon} ${dk}: ${fmtH(h)}` : `${icon} ${dk}: ${type}`;
  toast(msg,'ok');
}

  const history=JSON.parse(localStorage.getItem('vct_scan_cat_history')||'{}');

function buildScanCatGrid(selCat){

    <button class="scan-on-chip${selOn===o?' sel':''}"

function scanPickCat(cat,btn){
  scanSelCat=cat;
  document.querySelectorAll('.scan-cat-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');

function scanPickOn(on,btn){

  document.getElementById('scanOnCustom').value='';
  document.querySelectorAll('.scan-on-chip').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');

function scanCustomOnInput(val){
  scanCustomOnVal=val;
  if(val) { scanPendingON=''; document.querySelectorAll('.scan-on-chip').forEach(b=>b.classList.remove('sel')); }
  updateScanConfirmBtn();
}
function updateScanConfirmBtn(){
  const on=scanCustomOnVal||scanPendingON;
  const noOn=CATS_NO_ON.has(scanSelCat);
  const btn=document.getElementById('scanConfirmBtn');
  if(!btn)return;
  if(noOn)       btn.textContent=`▶ Start ${scanSelCat}`;
  else if(on)    btn.textContent=`▶ Start ${scanSelCat} · ${on}`;
  else           btn.textContent=`▶ Start ${scanSelCat||'…'} — vælg ON`;
  // Vis/skjul ON-sektion for Admin/Møde
  const onSection=document.getElementById('scanOnChips');
  const onInput=document.getElementById('scanOnCustom');
  if(onSection) onSection.style.display=noOn?'none':'';
  if(onInput)   onInput.style.display=noOn?'none':'';
}

// ── Scan via kamera ──────────────────────────────────
function scanOpen(){
  const overlay=document.getElementById('scanOverlay');
  overlay.classList.remove('hidden');
  document.getElementById('scanFab').classList.add('active-scan');
  if(!('BarcodeDetector' in window)){
    scanClose();
    const on=prompt('BarcodeDetector ikke understøttet i denne browser.\nIndtast ON-nummer manuelt (fx 3200):');
    if(on&&on.trim()) scanShowFromBarcode(on.trim().replace(/^ON\s*/i,'').trim());
    return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920}}})
    .then(stream=>{
      scanStream=stream;
      const video=document.getElementById('scanVideo');
      video.srcObject=stream; video.play();
      scanDetector=new BarcodeDetector({formats:['code_128','code_39','qr_code','ean_13','upc_a']});
      scanLoop();
    })
    .catch(()=>{ scanClose(); toast('Kamera-adgang nægtet','err'); });
}
function scanLoop(){
  const video=document.getElementById('scanVideo');
  if(!video||!scanDetector)return;
  scanDetector.detect(video).then(results=>{
    if(results.length>0){
      const raw=results[0].rawValue;
      const match=raw.match(/ON[\s\-]?(\d[\w\-]*)/i);
      const on=match?match[1]:raw.trim();
      scanClose();
      scanShowFromBarcode(on);
    } else { scanRafId=requestAnimationFrame(scanLoop); }
  }).catch(()=>{ scanRafId=requestAnimationFrame(scanLoop); });
}
function scanClose(){
  document.getElementById('scanOverlay').classList.add('hidden');
  document.getElementById('scanFab').classList.remove('active-scan');
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
  if(scanRafId){ cancelAnimationFrame(scanRafId); scanRafId=null; }
  scanDetector=null;
}

// Åbn popup med scannet ON-nummer
function scanShowFromBarcode(on){
  scanPendingON=on; scanCustomOnVal='';
  const history=JSON.parse(localStorage.getItem('vct_scan_cat_history')||'{}');
  scanSelCat=history[on]||history['__last__']||'Service';
  document.getElementById('scanPopupON').textContent='ON '+on;
  const sub=activeTimer
    ? `Stopper: ${activeTimer.label} — vælg kategori`
    : 'Bekræft kategori';
  document.getElementById('scanPopupSub').textContent=sub;
  document.getElementById('scanConfirmBtn').textContent=`▶ Start ${scanSelCat} · ${on}`;
  document.getElementById('scanOnCustom').value='';
  buildScanCatGrid(scanSelCat);
  buildScanOnChips(on);
  document.getElementById('scanPopup').classList.remove('hidden');
}

// ── Bekræft og start job ─────────────────────────────
// Kategorier der IKKE kræver ON-nummer — defineret sammen med CATS ovenfor

function scanConfirm(){
  const customVal=scanCustomOnVal.trim();
  const on=customVal||scanPendingON||
    (CATS_NO_ON.has(scanSelCat)?scanSelCat:null); // Admin/Møde bruger kategori som ON
  if(!on){ toast('Vælg eller skriv ON-nummer','err'); return; }
  if(!scanSelCat){ toast('Vælg kategori','err'); return; }
  const now=nowHM();
  const dk=dateKey(new Date());
  // Stop aktivt job
  if(activeTimer){
    const sh=hmToH(activeTimer.startHM), eh=hmToH(now);
    if(eh>sh){
      const fr=getFrokost(dk);
      if(fr && sh<hmToH(fr.start) && eh>hmToH(fr.stop)){
        const e1={on:activeTimer.on,cat:activeTimer.cat||'',start:activeTimer.startHM,stop:fr.start,hours:hmToH(fr.start)-sh,date:dk};
        const e2={on:activeTimer.on,cat:activeTimer.cat||'',start:fr.stop,stop:now,hours:eh-hmToH(fr.stop),date:dk};
        if(activeTimer.special){e1.special=activeTimer.special;e2.special=activeTimer.special;}
        addEntry(dk,e1); addEntry(dk,e2); recalcSpecial(dk);
      } else {
        const entry={on:activeTimer.on,cat:activeTimer.cat||'',start:activeTimer.startHM,stop:now,hours:eh-sh,date:dk};
        if(activeTimer.special)entry.special=activeTimer.special;
        addEntry(dk,entry); recalcSpecial(dk);
      }
    }
    activeTimer=null; localStorage.removeItem('vct_activeTimer');
  }
  // Start nyt
  const label=`${scanSelCat} · ${on}`;
  activeTimer={on,cat:scanSelCat,label,t0:Date.now(),startHM:now};
  localStorage.setItem('vct_activeTimer',JSON.stringify(activeTimer));
  // Husk kategori-valg
  const history=JSON.parse(localStorage.getItem('vct_scan_cat_history')||'{}');
  history[on]=scanSelCat; history['__last__']=scanSelCat;
  localStorage.setItem('vct_scan_cat_history',JSON.stringify(history));
  scheduleSave(); // Sync til Gist
  toast(`▶ ${label}  ${now}`,'ok');
  scanDismiss();
  if(currentTab!=='dag') tab('dag'); else render();
}
function scanDismiss(){
  document.getElementById('scanPopup').classList.add('hidden');
  scanPendingON=''; scanSelCat=''; scanCustomOnVal='';
}


// ─────────────────────────────────────────────────────────────────────
init();
</script>
