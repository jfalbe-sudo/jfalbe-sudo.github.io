<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#040F1A">
<title>Timer · JIF</title>
<style>
:root {
  --ink:#040F1A;--ink2:#081828;--ink3:#0d2236;--ink4:#122d47;--ink5:#1a3d5c;
  --gold:#F5AC00;--green:#3DDC97;--red:#FF5C5C;--amber:#FF9F43;--blue:#4DA6FF;--purple:#B06EFF;
  --slate:#6B8FA8;--mist:#A8C4D8;--snow:#EEF4F8;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono','Consolas',monospace;--r:16px;--r2:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--ink);color:var(--snow);min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.app-header{padding:14px 18px 10px;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50;background:var(--ink);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.date-line{font-size:13px;color:var(--mist);margin-top:2px;font-weight:500}
.week-chip{background:var(--ink4);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gold)}
.sync-indicator{width:8px;height:8px;border-radius:50%;background:var(--slate);flex-shrink:0;transition:background .3s}
.sync-indicator.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
.sync-indicator.ok{background:var(--green)}
.sync-indicator.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
nav{display:flex;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:53px;z-index:49}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--slate);font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;transition:color .15s,border-color .15s}
.nav-btn svg{width:17px;height:17px}
.nav-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
main{flex:1;overflow-y:auto;padding:12px 12px 40px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--ink2);border-radius:var(--r);padding:14px}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.stat-box{background:var(--ink3);border-radius:var(--r2);padding:11px 8px;text-align:center}
.stat-num{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.stat-lbl{font-size:9px;color:var(--slate);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.good{color:var(--green)}.bad{color:var(--red)}.amber{color:var(--amber)}.white{color:var(--snow)}.blue{color:var(--blue)}
.prog-wrap{margin-top:11px}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--slate);margin-bottom:4px}
.prog-bg{background:rgba(255,255,255,.06);border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.live-card{background:linear-gradient(140deg,var(--ink3),var(--ink4));border:1.5px solid rgba(245,172,0,.35);border-radius:var(--r);padding:14px}
.live-label{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.4s ease-in-out infinite}
.live-project{font-size:16px;font-weight:700;margin-top:5px}
.live-sub{font-size:11px;color:var(--slate);margin-top:1px}
.live-time{font-size:40px;font-weight:900;font-family:var(--mono);color:var(--gold);text-align:center;margin:10px 0;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.entry{background:var(--ink3);border-radius:var(--r2);margin-bottom:5px;overflow:hidden}
.entry-main-row{display:flex;align-items:center;gap:10px;padding:10px 12px}
.entry-time-col{text-align:right;flex-shrink:0;min-width:34px}
.entry-time{font-size:11px;color:var(--slate);font-family:var(--mono);line-height:1.7}
.entry-divider{width:1px;height:26px;background:rgba(255,255,255,.08);flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-on{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-cat{font-size:11px;color:var(--slate);margin-top:1px}
.entry-dur{font-size:13px;font-weight:800;color:var(--gold);font-family:var(--mono);flex-shrink:0}
.entry-actions{display:flex;border-top:1px solid rgba(255,255,255,.05)}
.entry-btn{flex:1;background:none;border:none;color:var(--slate);font-size:11px;font-weight:700;padding:8px;cursor:pointer;font-family:var(--font)}
.entry-btn.edit{color:var(--gold)}.entry-btn.del{color:var(--red)}
.entry-btn-sep{width:1px;background:rgba(255,255,255,.05)}
.edit-panel{background:var(--ink4);padding:11px 12px;border-top:1px solid rgba(245,172,0,.2)}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.edit-input{width:100%;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:var(--snow);padding:10px 11px;font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none}
.edit-input:focus{border-color:var(--gold)}
.edit-btns{display:flex;gap:7px}
.btn-save-edit{flex:1;background:var(--gold);color:var(--ink);border:none;border-radius:50px;padding:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font)}
.btn-cancel-edit{flex:1;background:var(--ink3);color:var(--slate);border:none;border-radius:50px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)}
.special-day{border-radius:var(--r2);padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:5px}
.special-syg{background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.3)}
.special-barnsyg{background:rgba(77,166,255,.12);border:1px solid rgba(77,166,255,.3)}
.special-p56{background:rgba(176,110,255,.12);border:1px solid rgba(176,110,255,.3)}
.empty{text-align:center;color:var(--slate);padding:24px 16px;font-size:14px;line-height:1.7}
.btn{display:block;width:100%;border:none;border-radius:50px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-green{background:var(--green);color:var(--ink)}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--ink4);color:var(--snow)}
.btn-sm{padding:8px 14px;font-size:12px;font-weight:700;border-radius:50px;border:none;cursor:pointer;font-family:var(--font)}
.btn-now{background:rgba(245,172,0,.12);color:var(--gold);border:1px solid rgba(245,172,0,.25);margin-top:5px;width:100%}
.form-col{display:flex;flex-direction:column;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.field-label{font-size:10px;color:var(--slate);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px}
select,input[type=time],input[type=text]{width:100%;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r2);color:var(--snow);padding:11px 13px;font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none;transition:border-color .15s}
select:focus,input:focus{border-color:var(--gold)}
select option{background:#081828}
.on-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.on-chip{background:var(--ink4);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--snow)}
.on-chip.sel{background:rgba(245,172,0,.2);border-color:var(--gold);color:var(--gold)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.cat-btn{background:var(--ink4);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--r2);padding:10px 8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;color:var(--snow)}
.cat-btn.sel{background:rgba(245,172,0,.15);border-color:var(--gold);color:var(--gold)}
.special-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.special-btn{border:1.5px solid;border-radius:var(--r2);padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;background:transparent;font-family:var(--font)}
.special-btn.syg{border-color:rgba(255,92,92,.4);color:var(--red)}
.special-btn.barnsyg{border-color:rgba(77,166,255,.4);color:var(--blue)}
.special-btn.syg.sel{background:rgba(255,92,92,.15)}
.special-btn.barnsyg.sel{background:rgba(77,166,255,.15)}
.week-row{background:var(--ink3);border-radius:var(--r2);margin-bottom:5px;border:1.5px solid transparent;overflow:hidden}
.week-row.today{border-color:rgba(245,172,0,.3)}
.week-row.syg-day{border-color:rgba(255,92,92,.3);background:rgba(255,92,92,.05)}
.week-row.barnsyg-day{border-color:rgba(77,166,255,.3);background:rgba(77,166,255,.05)}
.wr-hdr{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.wr-day{width:36px;flex-shrink:0}
.wr-name{font-size:13px;font-weight:700}
.wr-date{font-size:10px;color:var(--slate);margin-top:1px}
.wr-mid{flex:1;min-width:0}
.wr-bar-row{display:flex;justify-content:space-between;font-size:10px;color:var(--slate);margin-bottom:3px}
.wr-bar-bg{background:rgba(255,255,255,.06);border-radius:99px;height:5px;overflow:hidden}
.wr-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.wr-diff{font-size:10px;margin-top:3px;font-weight:700;font-family:var(--mono)}
.wr-right{text-align:right;flex-shrink:0}
.wr-badge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700;background:var(--gold);color:var(--ink);display:inline-block}
.wr-body{display:none;padding:0 12px 10px;border-top:1px solid rgba(255,255,255,.05)}
.wr-body.open{display:block}
.week-summary{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.ws{background:var(--ink3);border-radius:var(--r2);padding:12px}
.ws-val{font-size:20px;font-weight:900;font-family:var(--mono)}
.ws-lbl{font-size:10px;color:var(--slate);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.promak-box{background:var(--ink3);border-radius:var(--r2);padding:11px 13px;border:1px solid rgba(245,172,0,.15)}
.promak-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.promak-row:last-child{border-bottom:none}
.report-week{background:var(--ink3);border-radius:var(--r2);margin-bottom:6px;overflow:hidden}
.report-week-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;cursor:pointer}
.report-week-title{font-size:13px;font-weight:700}
.report-week-meta{font-size:11px;color:var(--slate)}
.report-week-hours{font-size:14px;font-weight:800;color:var(--gold);font-family:var(--mono)}
.report-week-body{display:none;padding:0 13px 11px}
.report-week-body.open{display:block}
.report-entry{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.report-entry:last-child{border-bottom:none}
.report-year-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.rys{background:var(--ink3);border-radius:var(--r2);padding:12px;text-align:center}
.rys-val{font-size:20px;font-weight:900}
.rys-lbl{font-size:9px;color:var(--slate);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.daytype-row{display:flex;gap:6px;flex-wrap:wrap}
.daytype-btn{border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;font-family:var(--font);color:var(--slate)}
.daytype-btn.sel-kontor{background:rgba(61,220,151,.15);border-color:var(--green);color:var(--green)}
.daytype-btn.sel-hjemme{background:rgba(245,172,0,.15);border-color:var(--gold);color:var(--gold)}
.daytype-btn.sel-syg{background:rgba(255,92,92,.15);border-color:var(--red);color:var(--red)}
.daytype-btn.sel-barnsyg{background:rgba(77,166,255,.15);border-color:var(--blue);color:var(--blue)}
.daytype-btn.sel-p56{background:rgba(176,110,255,.15);border-color:var(--purple);color:var(--purple)}
.daytype-btn.sel-ferie{background:rgba(61,220,151,.15);border-color:var(--green);color:var(--green)}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink3);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:11px 20px;font-size:13px;font-weight:600;transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:999;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(61,220,151,.4);color:var(--green)}
.toast.err{border-color:rgba(255,92,92,.4);color:var(--red)}
.save-bar{position:fixed;top:0;left:0;height:2px;width:0;background:var(--gold);z-index:200;transition:width .3s}
/* KALENDER */
.kal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kal-title{font-size:16px;font-weight:800}
.kal-nav{background:var(--ink4);border:none;color:var(--gold);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.kal-grid{display:grid;grid-template-columns:24px repeat(7,1fr);gap:3px}
.kal-week-num{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(107,143,168,.5);padding:2px}
.kal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--slate);padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
.kal-cell{border-radius:8px;padding:4px 2px;min-height:42px;position:relative;cursor:pointer;transition:background .15s}
.kal-cell:active{opacity:.7}
.kal-cell.other-month{opacity:.25}
.kal-cell.today{border:1.5px solid var(--gold)}
.kal-date{font-size:12px;font-weight:700;text-align:center;margin-bottom:2px}
.kal-dot{width:5px;height:5px;border-radius:50%;margin:1px auto}
.kal-cell.has-kontor{background:rgba(61,220,151,.08)}
.kal-cell.has-hjemme{background:rgba(245,172,0,.08)}
.kal-cell.has-syg{background:rgba(255,92,92,.15)}
.kal-cell.has-barnsyg{background:rgba(77,166,255,.15)}
.kal-cell.has-ferie{background:rgba(61,220,151,.15)}
.kal-cell.has-fri{background:rgba(176,110,255,.1)}
.kal-cell.weekend{opacity:.4}
.kal-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.kal-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--slate)}
.kal-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
</style>
</head>
<body>
<div class="save-bar" id="saveBar"></div>
<header class="app-header">
  <div>
    <div class="logo">Vestergaard · Timer <span style="font-size:9px;opacity:.5;letter-spacing:1px">v1.1</span></div>
    <div class="date-line" id="hdrDate">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="sync-indicator" id="syncDot" title="Sync status"></div>
    <div class="week-chip" id="hdrWeek">Uge —</div>
  </div>
</header>
<nav>
  <button class="nav-btn on" onclick="tab('dag')" id="tab-dag">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>I dag
  </button>
  <button class="nav-btn" onclick="tab('tilfoej')" id="tab-tilfoej">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Tilføj
  </button>
  <button class="nav-btn" onclick="tab('uge')" id="tab-uge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Uge
  </button>
  <button class="nav-btn" onclick="tab('rapport')" id="tab-rapport">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Rapport
  </button>
  <button class="nav-btn" onclick="tab('kalender')" id="tab-kalender">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="14" r="1" fill="currentColor"/><circle cx="12" cy="14" r="1" fill="currentColor"/><circle cx="16" cy="14" r="1" fill="currentColor"/></svg>Kalender
  </button>
</nav>
<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  GITHUB SYNC CONFIG
// ═══════════════════════════════════════════════════════
const GIST_ID    = 'cdff9229870dc7f4c74b99cf30acedfd';
const GIST_FILE  = 'timer_data.json';
const GIST_API   = `https://api.github.com/gists/${GIST_ID}`;
function getToken(){ return localStorage.getItem('vct_ghtoken')||''; }

// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const DAY_TARGET = [7.5,7.5,7.5,7.5,6.5,0,0];
const DAY_S   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const MONTHS_S= ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
const WDAYS   = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
const QUICK_ON= ['Beta M','My M','2613','2965','2973','3179','3200','3201'];
const CATS    = [
  {label:'Admin',icon:'📋'},{label:'Beta M',icon:'🔧'},
  {label:'My M',icon:'🔩'},{label:'Møde',icon:'💬'},
  {label:'Kørsel',icon:'🚗'},{label:'Service',icon:'⚙️'},
  {label:'Andet',icon:'📌'},
];
const DAY_TYPES=[
  {id:'kontor',label:'🏢 Kontor',cls:'sel-kontor'},
  {id:'hjemme',label:'🏠 Hjemme',cls:'sel-hjemme'},
  {id:'syg',label:'🤒 Syg',cls:'sel-syg'},
  {id:'barnsyg',label:'👶 Barn syg',cls:'sel-barnsyg'},
  {id:'p56',label:'§56',cls:'sel-p56'},
  {id:'ferie',label:'🌴 Ferie',cls:'sel-ferie'},
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let db = { version:3, days:{} }; // master database
let activeTimer=null, timerIv=null, currentTab='dag';
let selCat='', selOn='', customOn='', selSpecial='';
let editingIdx=-1;
let syncTimer=null, isDirty=false;

// ═══════════════════════════════════════════════════════
//  GITHUB SYNC
// ═══════════════════════════════════════════════════════
function setSyncStatus(s){ // 'syncing' | 'ok' | 'err' | ''
  const d=document.getElementById('syncDot');
  if(d){ d.className='sync-indicator'+(s?' '+s:''); }
}

async function ghLoad(){
  setSyncStatus('syncing');
  try {
    const r=await fetch(GIST_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) throw new Error(r.status);
    const j=await r.json();
    const fileContent=j.files[GIST_FILE]?.content;
    if(!fileContent) throw new Error('Ingen data i Gist');
    const decoded=JSON.parse(fileContent);
    db=decoded;
    localStorage.setItem('vct_db', JSON.stringify(db));
    setSyncStatus('ok');
  } catch(e){
    console.error('ghLoad',e);
    setSyncStatus('err');
    const local=localStorage.getItem('vct_db');
    if(local) try{ db=JSON.parse(local); }catch{}
  }
}

async function ghSave(){
  if(!isDirty) return;
  setSyncStatus('syncing');
  try {
    const body={files:{[GIST_FILE]:{content:JSON.stringify(db,null,2)}}};
    const r=await fetch(GIST_API,{
      method:'PATCH',
      headers:{'Authorization':`token ${getToken()}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok){ const t=await r.text(); throw new Error(t); }
    localStorage.setItem('vct_db', JSON.stringify(db));
    isDirty=false;
    setSyncStatus('ok');
  } catch(e){
    console.error('ghSave',e);
    setSyncStatus('err');
    toast('Sync fejl — data gemt lokalt','err');
  }
}

function scheduleSave(){
  isDirty=true;
  localStorage.setItem('vct_db', JSON.stringify(db));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(ghSave, 2000);
}

function checkDailyBackup(){
  const today = dateKey(new Date());
  const lastBackup = localStorage.getItem('vct_last_backup');
  if(lastBackup === today) return; // Allerede taget backup i dag
  // Vent 5 sekunder efter app åbner så data er loadet
  setTimeout(()=>{
    if(Object.keys(db.days).length === 0) return; // Ingen data endnu
    downloadBackup();
    localStorage.setItem('vct_last_backup', today);
  }, 5000);
}

// ═══════════════════════════════════════════════════════
//  DATA ACCESS
// ═══════════════════════════════════════════════════════
function getEntries(dk)     { return (db.days[dk]||{}).entries||[]; }
function getDayType(dk)     { return (db.days[dk]||{}).type||'kontor'; }
function getPartial(dk,t)   { return ((db.days[dk]||{}).partial||{})[t]||''; }

function ensureDay(dk){ if(!db.days[dk]) db.days[dk]={entries:[],type:'kontor',partial:{}}; }

function saveEntries(dk,arr){
  ensureDay(dk); db.days[dk].entries=arr; scheduleSave();
}
function addEntry(dk,e){
  ensureDay(dk); db.days[dk].entries.push(e); scheduleSave();
}
function setDayType(dk,t){
  ensureDay(dk); db.days[dk].type=t; scheduleSave();
}
function savePartialH(dk,t,v){
  ensureDay(dk);
  if(!db.days[dk].partial) db.days[dk].partial={};
  if(v) db.days[dk].partial[t]=v; else delete db.days[dk].partial[t];
  scheduleSave();
}

// ═══════════════════════════════════════════════════════
//  DATE
// ═══════════════════════════════════════════════════════
const fmtH=h=>{if(!h||h<0)h=0;const t=Math.round(h*60);return`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;};
const nowHM=()=>{const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const dateKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const weekNum=d=>{const c=new Date(d);c.setHours(0,0,0,0);c.setDate(c.getDate()+4-(c.getDay()||7));return Math.ceil((((c-new Date(c.getFullYear(),0,1))/86400000)+1)/7);};
const monday=d=>{const c=new Date(d);const day=c.getDay()||7;c.setDate(c.getDate()-day+1);c.setHours(0,0,0,0);return c;};
const todayIdx=()=>(new Date().getDay()+6)%7;
const hmToH=hm=>{if(!hm)return 0;const[h,m]=hm.split(':').map(Number);return h+m/60;};

function setDT(dk,type){
  setDayType(dk,type);
  if(['syg','barnsyg','p56'].includes(type)){
    const d=new Date(dk), di=(d.getDay()+6)%7;
    const target=DAY_TARGET[di]||7.5;
    // Fjern tidligere auto-entries
    const existing=getEntries(dk).filter(e=>!e.auto_special);
    const workedH=existing.reduce((s,e)=>s+e.hours,0);
    const remaining=Math.max(0,target-workedH);
    if(remaining>0.1){
      // Find seneste stop-tidspunkt
      let lastStop='08:00';
      if(existing.length>0){
        const stops=existing.map(e=>e.stop).filter(Boolean).sort();
        if(stops.length>0) lastStop=stops[stops.length-1];
      }
      const [sh,sm]=lastStop.split(':').map(Number);
      const stopMin=sh*60+sm+Math.round(remaining*60);
      const stopStr=`${String(Math.floor(stopMin/60)).padStart(2,'0')}:${String(stopMin%60).padStart(2,'0')}`;
      const label=type==='syg'?'Syg':type==='barnsyg'?'Barn syg':'§56';
      existing.push({on:label,cat:'',start:lastStop,stop:stopStr,hours:remaining,date:dk,special:type,auto_special:true});
      saveEntries(dk,existing);
    }
  }
  render();
  const msgs={syg:'🤒 Sygedag',barnsyg:'👶 Barn syg',p56:'§56',hjemme:'🏠 Hjemme',kontor:'🏢 Kontor',ferie:'🌴 Ferie'};
  toast((msgs[type]||type)+' registreret','ok');
}
function startEdit(i){editingIdx=i;render();}
function cancelEdit(){editingIdx=-1;render();}
function saveEdit(dk,i){
  const on=document.getElementById('editOn').value.trim();
  const start=document.getElementById('editStart').value;
  const stop=document.getElementById('editStop').value;
  if(!on||!start||!stop){toast('Udfyld alle felter','err');return;}
  const sh=hmToH(start),eh=hmToH(stop);
  if(eh<=sh){toast('Stop skal være efter start','err');return;}
  const arr=getEntries(dk); arr[i]={...arr[i],on,start,stop,hours:eh-sh};
  saveEntries(dk,arr); editingIdx=-1; toast('✓ Rettet','ok'); render();
}
function doDelEntry(dk,i){
  const arr=getEntries(dk); arr.splice(i,1); saveEntries(dk,arr);
  editingIdx=-1; render(); toast('Slettet','err');
}
function startDisp(){
  if(timerIv)clearInterval(timerIv);

    const el=document.getElementById('timerDisp'); if(!el){clearInterval(timerIv);return;}
    const ms=Date.now()-activeTimer.t0;

    el.textContent=`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

function pickCat(cat){selCat=cat;if(!selOn&&!customOn)selOn=cat;render();tab('tilfoej');}
function pickOn(on){selOn=on;customOn='';render();tab('tilfoej');}
function toggleSpecial(s){selSpecial=selSpecial===s?'':s;render();tab('tilfoej');}
function setNow(id){document.getElementById(id).value=nowHM();}
function getLabel(){const on=customOn||selOn||selCat||'?';return(selCat&&selCat!==on)?`${on} / ${selCat}`:on;}

function startTimer(){
  if(!selCat&&!selOn&&!customOn&&!selSpecial){toast('Vælg kategori eller ON-nummer','err');return;}
  const on=selSpecial?(selSpecial==='syg'?'Syg':selSpecial==='barnsyg'?'Barn syg':'§56'):(customOn||selOn||selCat);
  const label=selSpecial?(selSpecial==='syg'?'🤒 Syg':selSpecial==='barnsyg'?'👶 Barn syg':'§56'):getLabel();
  activeTimer={on,cat:selCat,label,t0:Date.now(),startHM:nowHM(),special:selSpecial};
  localStorage.setItem('vct_activeTimer',JSON.stringify(activeTimer));
  toast(`▶ ${label} startet`,'ok'); tab('dag');
}
function stopTimer(){
  if(!activeTimer)return;
  clearInterval(timerIv);
  const stop=nowHM(),hours=(Date.now()-activeTimer.t0)/3600000;
  const dk=dateKey(new Date());
  // Tjek overlap
  const overlap = checkOverlap(dk, activeTimer.startHM, stop);
  if(overlap){
    toast('⚠️ '+overlap,'err');
    activeTimer=null; localStorage.removeItem('vct_activeTimer');
    render(); return;
  }
  const entry={on:activeTimer.on,cat:activeTimer.cat,start:activeTimer.startHM,stop,hours,date:dk};
  if(activeTimer.special)entry.special=activeTimer.special;
  addEntry(dk,entry);
  activeTimer=null; localStorage.removeItem('vct_activeTimer');
  toast('✓ Gemt','ok'); tab('dag');
}
function checkOverlap(dk, newStart, newStop){
  const entries = getEntries(dk);
  const ns = hmToH(newStart), ne = hmToH(newStop);
  for(const e of entries){
    const es = hmToH(e.start), ee = hmToH(e.stop);
    if(ns < ee && ne > es){
      return `Overlapper med ${e.on} (${e.start}–${e.stop})`;
    }
  }
  return null;
}

function saveManual(){
  const start=document.getElementById('mStart').value,stop=document.getElementById('mStop').value;

  const on=selSpecial?(selSpecial==='syg'?'Syg':selSpecial==='barnsyg'?'Barn syg':'§56'):(customOn||selOn||selCat);
  if(!on){toast('Vælg kategori eller ON-nummer','err');return;}

  const overlap = checkOverlap(dk, start, stop);
  if(overlap){toast('⚠️ '+overlap,'err');return;}
  const entry={on,cat:selCat,start,stop,hours:eh-sh,date:dk};

  addEntry(dk,entry); savePulse(); toast(`✓ ${on}  ${start}–${stop}`,'ok'); tab('dag');
}

// ═══════════════════════════════════════════════════════
function ugeHTML(){
  const now=new Date(),mon=monday(now),ti=todayIdx();
  let totalH=0,officeDays=0,homeDays=0,sygDays=0,barnSygDays=0,ferieDays=0;
  const daysHTML=DAY_S.map((name,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const dk=dateKey(d);
    const entries=getEntries(dk);
    const type=getDayType(dk);
    const h=entries.reduce((s,e)=>s+e.hours,0);
    const target=DAY_TARGET[i];
    if(i<5){
      if(type==='syg'||type==='p56') sygDays++;
      else if(type==='barnsyg') barnSygDays++;
      else if(type==='ferie') ferieDays++;
      else if(h>0){totalH+=h;type==='hjemme'?homeDays++:officeDays++;}
    }
    const pct=target>0?Math.min(100,(h/target)*100):0;
    const diff=h-target;
    const isToday=i===ti,isPast=i<ti&&i<5;
    const isSygDay=type==='syg'||type==='p56',isBarnSygDay=type==='barnsyg',isP56Day=type==='p56';
    const barClr=isSygDay||isBarnSygDay?'var(--blue)':h>=target?'var(--green)':h>0?'var(--gold)':'transparent';
    const rowCls=isSygDay?'syg-day':isBarnSygDay?'barnsyg-day':isToday?'today':'';
    let diffHTML='';
    if(isSygDay)          diffHTML=`<div class="wr-diff" style="color:var(--red)">${isP56Day?'§56':'🤒 Sygedag'}</div>`;
    else if(isBarnSygDay) diffHTML=`<div class="wr-diff" style="color:var(--blue)">👶 Barn syg</div>`;
    else if(type==='ferie') diffHTML=`<div class="wr-diff" style="color:var(--green)">🌴 Ferie</div>`;
    else if((isPast||isToday)&&h>0){
      const dc=diff>=0?'color:var(--green)':'color:var(--amber)';

          <div class="wr-bar-row"><span>${type==='hjemme'?'🏠':type==='syg'?'🤒':type==='barnsyg'?'👶':type==='p56'?'§':type==='ferie'?'🌴':'🏢'}</span><span>${h>0?fmtH(h):'—'}</span></div>
          <div class="wr-bar-bg"><div class="wr-bar-fill" style="width:${pct}%;background:${barClr}"></div></div>
          ${diffHTML}

      </div>
      ${entries.length>0?`<div class="wr-body" id="wd-${dk}">${entryRows}</div>`:''}
    </div>`;
  }).join('');
  const wDiff=totalH-(7.5*4+6.5);

  <div class="card">
    <div class="section-label">Uge ${weekNum(now)} · oversigt</div>
    <div class="week-summary">
      <div class="ws"><div class="ws-val">${fmtH(totalH)}</div><div class="ws-lbl">Arbejdet</div></div>
      <div class="ws"><div class="ws-val" style="${wDiff>=0?'color:var(--green)':'color:var(--red)'}">${wDiff>=0?'+':'-'}${fmtH(Math.abs(wDiff))}</div><div class="ws-lbl">${wDiff>=0?'Overarb.':'Mangler'}</div></div>
      <div class="ws"><div class="ws-val">🏢 ${officeDays}</div><div class="ws-lbl">Kontor</div></div>
      <div class="ws"><div class="ws-val">🏠 ${homeDays}</div><div class="ws-lbl">Hjemme</div></div>
      ${sygDays>0?`<div class="ws"><div class="ws-val" style="color:var(--red)">🤒 ${sygDays}</div><div class="ws-lbl">Syg/§56</div></div>`:''}
      ${barnSygDays>0?`<div class="ws"><div class="ws-val" style="color:var(--blue)">👶 ${barnSygDays}</div><div class="ws-lbl">Barn syg</div></div>`:''}
      ${ferieDays>0?`<div class="ws"><div class="ws-val" style="color:var(--green)">🌴 ${ferieDays}</div><div class="ws-lbl">Feriedage</div></div>`:''}
    </div>

}

function buildUgeExport(mon){
  const totals={};
  for(let i=0;i<5;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    for(const e of getEntries(dateKey(d))){
      if(e.special)continue;
      totals[e.on]=(totals[e.on]||0)+e.hours;
    }
  }
  const keys=Object.keys(totals);
  if(!keys.length)return'';
  const txt=keys.map(k=>`${k}: ${fmtH(totals[k])}`).join('\n');
  return`
  <div class="card">
    <div class="section-label">Promak-oversigt</div>
    <div class="promak-box">${keys.map(k=>`<div class="promak-row"><span style="font-weight:600">${k}</span><span style="color:var(--gold);font-family:var(--mono);font-weight:800">${fmtH(totals[k])}</span></div>`).join('')}</div>
    <button class="btn btn-ghost" style="margin-top:9px" onclick="copyText(\`${txt.replace(/`/g,'\\`')}\`)">📋 Kopiér til Promak</button>
  </div>`;
}

function rapportHTML(){
  const byWeek={};
  Object.keys(db.days).sort().forEach(dk=>{
    const d=new Date(dk);
    const wk=`${d.getFullYear()}-W${String(weekNum(d)).padStart(2,'0')}`;
    if(!byWeek[wk])byWeek[wk]={mon:monday(d),days:{},totalH:0,officeDays:0,homeDays:0,sygDays:0,barnSygDays:0};
    byWeek[wk].days[dk]=db.days[dk];
  });
  const currentYear=new Date().getFullYear();
  let yearTotal=0,yearOffice=0,yearHome=0,yearSyg=0,yearBarnSyg=0,yearFerie=0;
  const weekKeys=Object.keys(byWeek).sort().reverse();
  weekKeys.forEach(wk=>{
    const w=byWeek[wk];
    Object.keys(w.days).forEach(dk=>{
      const d=new Date(dk);
      if(d.getFullYear()!==currentYear)return;
      const di=(d.getDay()+6)%7;
      if(di>=5)return;
      const {entries=[],type='kontor'}=w.days[dk];
      const h=entries.reduce((s,e)=>s+e.hours,0);
      if(type==='syg'||type==='p56'){w.sygDays++;yearSyg++;}
      else if(type==='barnsyg'){w.barnSygDays++;yearBarnSyg++;}
      else if(type==='ferie'){w.ferieDays=(w.ferieDays||0)+1;yearFerie++;}
      else if(h>0){w.totalH+=h;yearTotal+=h;type==='hjemme'?(w.homeDays++,yearHome++):(w.officeDays++,yearOffice++);}
    });
  });
  const weeksHTML=weekKeys.map(wk=>{
    const w=byWeek[wk];

    const fri=new Date(mon);fri.setDate(mon.getDate()+4);
    const wNum=weekNum(mon);
    const onTotals={};
    Object.values(w.days).forEach(({entries=[]})=>{
      entries.forEach(e=>{if(!e.special)onTotals[e.on]=(onTotals[e.on]||0)+e.hours;});
    });
    const badges=[];
    if(w.officeDays)badges.push(`🏢${w.officeDays}`);
    if(w.homeDays)badges.push(`🏠${w.homeDays}`);
    if(w.sygDays)badges.push(`🤒${w.sygDays}`);
    if(w.barnSygDays)badges.push(`👶${w.barnSygDays}`);
    if(w.ferieDays)badges.push(`🌴${w.ferieDays}`);
    // Skip uger der er helt tomme (ingen timer OG ingen special dage)
    const hasContent = w.totalH > 0 || w.officeDays > 0 || w.homeDays > 0 ||
                       w.sygDays > 0 || w.barnSygDays > 0 || (w.ferieDays||0) > 0;
    if(!hasContent) return '';
    return`<div class="report-week">
      <div class="report-week-hdr" onclick="toggleWeek('rwb-${wk}')">
        <div>
          <div class="report-week-title">Uge ${wNum}</div>
          <div class="report-week-meta">${mon.getDate()}. ${MONTHS_S[mon.getMonth()]} – ${fri.getDate()}. ${MONTHS_S[fri.getMonth()]} · ${badges.join(' ')}</div>
        </div>
        <div class="report-week-hours">${fmtH(w.totalH)}</div>
      </div>
      <div class="report-week-body" id="rwb-${wk}">
        ${Object.keys(onTotals).map(k=>`<div class="report-entry"><span>${k}</span><span style="color:var(--gold);font-family:var(--mono)">${fmtH(onTotals[k])}</span></div>`).join('')||'<div style="color:var(--slate);font-size:12px;padding:4px 0">Ingen registreringer</div>'}
      </div>
    </div>`;
  }).join('');
  return`
  <div class="card">
    <div class="section-label">${currentYear} · Årsovervigt</div>
    <div class="report-year-summary">
      <div class="rys"><div class="rys-val">${fmtH(yearTotal)}</div><div class="rys-lbl">Timer i alt</div></div>
      <div class="rys"><div class="rys-val">🏢 ${yearOffice}</div><div class="rys-lbl">Kontordage</div></div>
      <div class="rys"><div class="rys-val">🏠 ${yearHome}</div><div class="rys-lbl">Hjemmedage</div></div>
      <div class="rys"><div class="rys-val" style="color:var(--red)">🤒 ${yearSyg}</div><div class="rys-lbl">Syg/§56</div></div>
      <div class="rys"><div class="rys-val" style="color:var(--blue)">👶 ${yearBarnSyg}</div><div class="rys-lbl">Barn syg</div></div>
      <div class="rys"><div class="rys-val" style="color:var(--green)">🌴 ${yearFerie}</div><div class="rys-lbl">Feriedage</div></div>
      <div class="rys"><div class="rys-val">${yearOffice+yearHome}</div><div class="rys-lbl">Arbejdsdage</div></div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-ghost" style="flex:1" onclick="importData()">📥 Importer</button>
      <button class="btn btn-gold" style="flex:1" onclick="manualSync()">🔄 Sync nu</button>

function parseICS(text){
  // Unfold wrapped lines (ICS linjeskift med mellemrum/tab)
  text = text.replace(/\r?\n[ \t]/g, '');
  const lines = text.split(/\r?\n/);
  let inEvent=false, current={};
  let ferieCount=0;

  for(let i=0; i<lines.length; i++){
    const line = lines[i];
    if(line==='BEGIN:VEVENT'){ inEvent=true; current={}; continue; }
    if(line==='END:VEVENT'){
      inEvent=false;
      if(current.start){
        const before = ferieCount;
        processICSEvent(current);
        // Tæl kun hvis processICSEvent faktisk satte noget
        const s=(current.summary||'').toLowerCase();
        if(s.includes('ferie')||s.includes('fravær')) ferieCount++;
      }
      continue;
    }
    if(!inEvent) continue;

    // DTSTART - håndter både DATE og DATETIME format
    if(line.startsWith('DTSTART')){
      const val = line.includes(':') ? line.split(':').slice(1).join(':').trim() : '';
      if(val) current.start = val.substring(0,8); // Tag kun YYYYMMDD
    }
    if(line.startsWith('DTEND')){
      const val = line.includes(':') ? line.split(':').slice(1).join(':').trim() : '';
      if(val) current.end = val.substring(0,8);
    }
    if(line.startsWith('SUMMARY:')){
      current.summary = line.substring(8).trim();
    }
    // Håndter encoded tegn
    if(line.startsWith('SUMMARY;')){
      const idx = line.indexOf(':');
      if(idx>-1) current.summary = line.substring(idx+1).trim();
    }
  }
  return {ferie: ferieCount};
}

function processICSEvent(evt){
  const summary=(evt.summary||'').toLowerCase();
  const isFerie    = summary.includes('ferie');
  const isSyg      = summary.includes('syg')||summary.includes('sygdom');
  const isBarnSyg  = summary.includes('barn') && summary.includes('syg');
  const isHolyday  = summary.includes('helligdag')||summary.includes('fridag')||
                     summary.includes('holiday')||summary.includes('1. mai')||
                     summary.includes('grundlovsdag')||summary.includes('juledag')||
                     summary.includes('nytår')||summary.includes('påske')||
                     summary.includes('pinse')||summary.includes('kristi');
  const isFravær   = summary.includes('fravær')||summary.includes('fraværende')||
                     summary.includes('absent')||summary.includes('out of office')||
                     summary.includes('ikke på kontoret');

  if(!isFerie && !isHolyday && !isSyg && !isBarnSyg && !isFravær) return;

  let type = 'fri';
  if(isBarnSyg)   type = 'barnsyg';
  else if(isSyg)  type = 'syg';
  else if(isFerie||isFravær) type = 'ferie';

  // Parse dato fra ICS format YYYYMMDD
  function parseICSDate(s){
    if(!s) return null;
    const clean=s.substring(0,8);
    if(clean.length!==8) return null;
    return `${clean.slice(0,4)}-${clean.slice(4,6)}-${clean.slice(6,8)}`;
  }

  const startDk=parseICSDate(evt.start);
  const endDk=parseICSDate(evt.end);
  if(!startDk) return;

  // Sæt alle dage i perioden
  const start=new Date(startDk);
  const end=endDk?new Date(endDk):new Date(startDk);
  end.setDate(end.getDate()-1); // ICS DTEND er exclusive

  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const di=d.getDay();
    if(di===0||di===6) continue; // Skip weekend
    const dk=dateKey(new Date(d));
    // Sæt kun hvis dagen ikke allerede har timer
    const entries=getEntries(dk);
    if(entries.length===0){
      setDayType(dk, type);
    }
  }
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      const src=data.days||{};
      let count=0;
      Object.keys(src).forEach(dk=>{
        const day=src[dk];
        if(!db.days[dk]) db.days[dk]={entries:[],type:'kontor'};
        if(day.type&&day.type!=='kontor') db.days[dk].type=day.type;
        const existing=db.days[dk].entries||[];
        const existKeys=new Set(existing.map(e=>e.start+e.on));
        const newE=(day.entries||[]).filter(e=>!existKeys.has(e.start+e.on));
        db.days[dk].entries=[...existing,...newE];
        count+=newE.length;
      });
      scheduleSave();
      toast(`✓ ${count} registreringer importeret`,'ok');
      render();
    }catch(err){toast('Fejl: '+err.message,'err');}
  };
  input.click();
}

let kalMonth = new Date().getMonth();
let kalYear  = new Date().getFullYear();

function kalenderHTML(){
  const now   = new Date();
  const today = dateKey(now);
  const firstDay = new Date(kalYear, kalMonth, 1);
  const lastDay  = new Date(kalYear, kalMonth+1, 0);
  const startDow = (firstDay.getDay()+6)%7; // 0=Man
  const MONTHS_L = ['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'];
  const DAY_LABELS = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];

  // Dag-navne header
  const dayNames = '<div class="kal-day-name" style="opacity:0">U</div>' + DAY_LABELS.map(d=>`<div class="kal-day-name">${d}</div>`).join('');

  // Tomme celler før første dag
  let cells = '';
  let currentWeekDay = 0; // 0=Man

  // Første uge-nummer
  const firstWeekDate = new Date(kalYear, kalMonth, 1-startDow);
  cells += `<div class="kal-week-num">${weekNum(firstWeekDate)}</div>`;

  for(let i=0;i<startDow;i++){
    const prevDate = new Date(kalYear,kalMonth,1-startDow+i);
    cells += `<div class="kal-cell other-month"><div class="kal-date" style="color:var(--slate)">${prevDate.getDate()}</div></div>`;
    currentWeekDay++;
  }

  // Dage i måneden
  for(let d=1;d<=lastDay.getDate();d++){
    const date = new Date(kalYear,kalMonth,d);
    const dk   = dateKey(date);
    const dow  = (date.getDay()+6)%7; // 0=Man
    const isWeekend = dow>=5;
    const isToday   = dk===today;
    const type = getDayType(dk);
    const entries = getEntries(dk);
    const hasWork = entries.length>0;
    const workedH = entries.reduce((s,e)=>s+e.hours,0);

    let cls = 'kal-cell';
    if(isWeekend) cls+=' weekend';
    if(isToday)   cls+=' today';
    if(type==='ferie')    cls+=' has-ferie';
    else if(type==='syg'||type==='p56') cls+=' has-syg';
    else if(type==='barnsyg') cls+=' has-barnsyg';
    else if(type==='fri') cls+=' has-fri';
    else if(hasWork && type==='hjemme') cls+=' has-hjemme';
    else if(hasWork) cls+=' has-kontor';

    // Ikon
    let icon = '';
    if(type==='ferie')         icon = '🌴';
    else if(type==='syg')      icon = '🤒';
    else if(type==='p56')      icon = '§';
    else if(type==='barnsyg')  icon = '👶';
    else if(type==='fri')      icon = '🎉';
    else if(hasWork && type==='hjemme') icon = '🏠';
    else if(hasWork)           icon = '🏢';

    // Timer tekst
    const hoursText = hasWork && !['ferie','syg','barnsyg','fri','p56'].includes(type)
      ? `<div style="font-size:9px;text-align:center;color:var(--gold);font-family:var(--mono)">${fmtH(workedH)}</div>`
      : '';

    // Ny uge?
    const cellDow = (date.getDay()+6)%7;
    if(cellDow===0 && d>1){
      cells += `<div class="kal-week-num">${weekNum(date)}</div>`;
    }

    cells += `<div class="${cls}" onclick="kalDayClick('${dk}')">
      <div class="kal-date" style="${isToday?'color:var(--gold)':''}">${d}</div>
      ${icon?`<div style="text-align:center;font-size:13px;line-height:1">${icon}</div>`:''}
      ${hoursText}
    </div>`;
  }

  // Tomme celler efter sidste dag
  const remaining = (7 - (startDow + lastDay.getDate()) % 7) % 7;
  if(remaining > 0){
    const nextWeekDate = new Date(kalYear, kalMonth+1, 1);
    cells += `<div class="kal-week-num">${weekNum(nextWeekDate)}</div>`;
    for(let i=1;i<=remaining;i++){
      cells += `<div class="kal-cell other-month"><div class="kal-date" style="color:var(--slate)">${i}</div></div>`;
    }
  }

  // Måneds-statistik
  let mFerie=0,mSyg=0,mBarnSyg=0,mKontor=0,mHjemme=0,mTimer=0;
  for(let d=1;d<=lastDay.getDate();d++){
    const date=new Date(kalYear,kalMonth,d);
    const dow=(date.getDay()+6)%7;
    if(dow>=5) continue;
    const dk=dateKey(date);
    const type=getDayType(dk);
    const h=getEntries(dk).reduce((s,e)=>s+e.hours,0);
    if(type==='ferie') mFerie++;
    else if(type==='syg'||type==='p56') mSyg++;
    else if(type==='barnsyg') mBarnSyg++;
    else if(h>0){ mTimer+=h; type==='hjemme'?mHjemme++:mKontor++; }
  }

  return`
  <div class="card">
    <div class="kal-header">
      <button class="kal-nav" onclick="kalPrev()">‹</button>
      <div class="kal-title">${MONTHS_L[kalMonth]} ${kalYear}</div>
      <button class="kal-nav" onclick="kalNext()">›</button>
    </div>
    <div class="kal-grid">
      ${dayNames}
      ${cells}
    </div>
    <div class="kal-legend">
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(61,220,151,.4)"></div>Kontor</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(245,172,0,.3)"></div>Hjemme</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(61,220,151,.4);opacity:.6"></div>Ferie</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(255,92,92,.4)"></div>Syg</div>
      <div class="kal-leg-item"><div class="kal-leg-dot" style="background:rgba(77,166,255,.4)"></div>Barn syg</div>
    </div>
  </div>
  <div class="card">
    <div class="section-label">${MONTHS_L[kalMonth]} · Statistik</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
      <div class="stat-box"><div class="stat-num white">${fmtH(mTimer)}</div><div class="stat-lbl">Timer</div></div>
      <div class="stat-box"><div class="stat-num white">🏢 ${mKontor}</div><div class="stat-lbl">Kontor</div></div>
      <div class="stat-box"><div class="stat-num white">🏠 ${mHjemme}</div><div class="stat-lbl">Hjemme</div></div>
      ${mFerie>0?`<div class="stat-box"><div class="stat-num good">🌴 ${mFerie}</div><div class="stat-lbl">Ferie</div></div>`:''}
      ${mSyg>0?`<div class="stat-box"><div class="stat-num bad">🤒 ${mSyg}</div><div class="stat-lbl">Syg</div></div>`:''}
      ${mBarnSyg>0?`<div class="stat-box"><div class="stat-num blue">👶 ${mBarnSyg}</div><div class="stat-lbl">Barn syg</div></div>`:''}
    </div>
  </div>`;
}

function kalPrev(){ kalMonth--; if(kalMonth<0){kalMonth=11;kalYear--;} render(); }
function kalNext(){ kalMonth++; if(kalMonth>11){kalMonth=0;kalYear++;} render(); }
function kalDayClick(dk){
  // Naviger til dag og skift til I dag view
  // Vis dag-detaljer som toast
  const type=getDayType(dk);
  const entries=getEntries(dk);
  const h=entries.reduce((s,e)=>s+e.hours,0);
  const icons={kontor:'🏢',hjemme:'🏠',ferie:'🌴',syg:'🤒',barnsyg:'👶',p56:'§56',fri:'🎉'};
  const icon=icons[type]||'🏢';
  const msg = h>0 ? `${icon} ${dk}: ${fmtH(h)}` : `${icon} ${dk}: ${type}`;
  toast(msg,'ok');
}

init();
</script>
</body>
</html>
